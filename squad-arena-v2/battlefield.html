/* ── EXECUTE TURN ──
   • Con KND_SQUADWARS_API: una sola lógica de combate (SquadSimEngine vía submit_round). Sin fallback a calcDmg/aiTurn.
   • Sin API (demo / persistencia no disponible): executeTurnLocal (legado JS). */
async function executeTurn(){
  const alive=G.allies.filter(a=>a.hp>0);
  if(!alive.every(u=>G.actions[u.id])||G.phase!=='select')return;
  if(window.KND_SQUADWARS_API){
    await executeTurnSquadwarsServer();
    return;
  }
  await executeTurnLocal();
}
async function executeTurnLocal(){
  const alive=G.allies.filter(a=>a.hp>0);
  if(!alive.every(u=>G.actions[u.id])||G.phase!=='select')return;
  G.phase='anim';document.getElementById('send-btn').classList.remove('rdy');
  if(window.MWArenaSFX)MWArenaSFX.playConfirm();
  G.pendingPickEnemy=null;
  if(window.MWArenaThree)MWArenaThree.setEnemyPickMode(false);

  // Sort by speed (fastest first)
  const order=[...alive].sort((a,b)=>b.speed-a.speed);
  for(const u of order){
    const ab=G.actions[u.id];if(!ab||u.hp<=0)continue;
    await sl(200);
    const hasHeal=ab.healPct!=null&&Number(ab.healPct)>0;
    const hasDmg=ab.dmg!=null&&Number(ab.dmg)>0;
    if(hasHeal)await doHeal(u,ab);
    if(hasDmg)await doAtk(u,ab);
    if(ab.maxCd>0)ab.cd=ab.maxCd;
    const pay=ab.eCost!==undefined&&ab.eCost!==null?Number(ab.eCost):0;
    u.energy=Math.min(MW.MAX_ENERGY,u.energy-pay+MW.E_GAIN_ATK);
    await sl(200);
    renderUnits();
    if(checkEnd())return;
  }
  // Reduce ally CDs
  G.allies.forEach(a=>a.abilities.forEach(s=>{if(s.cd>0)s.cd--}));
  G.actions={};
  G.enemies.forEach(e=>{e.defending=false});
  if(checkEnd())return;

  // Enemy turn
  G.turn='enemy';G.phase='enemy';
  document.getElementById('tl').textContent="ENEMY TURN";document.getElementById('tl').style.color='var(--m)';
  await sl(280);await aiTurn();await sl(120);
  if(checkEnd())return;

  // New round
  G.round++;G.turn='player';G.phase='select';
  document.getElementById('tl').textContent='YOUR TURN';document.getElementById('tl').style.color='var(--c)';
  document.getElementById('rl').textContent='ROUND '+G.round;
  showPh('ROUND '+G.round);
  if(window.MWArenaSFX)MWArenaSFX.playRoundStart();
  G.enemies.forEach(a=>a.abilities.forEach(s=>{if(s.cd>0)s.cd--}));
  // Energy regen
  G.allies.forEach(u=>{if(u.hp>0)u.energy=Math.min(MW.MAX_ENERGY,u.energy+1)});
  G.enemies.forEach(u=>{if(u.hp>0)u.energy=Math.min(MW.MAX_ENERGY,u.energy+1)});
  renderUnits();buildHUD();updateConfirm();
}

/* ── ATTACK ── */
async function doAtk(atk,ab){
  let targets=[];
  if(ab.target==='all')targets=G.enemies.filter(e=>e.hp>0);
  else if(ab.target==='any'){
    const pool=G.enemies.filter(e=>e.hp>0);
    const picked=G.pendingPickEnemy&&pool.some(e=>e.id===G.pendingPickEnemy.id)?G.pendingPickEnemy:null;
    targets=[picked||pool.sort((a,b)=>a.hp-b.hp)[0]].filter(Boolean);
  }
  else targets=getValidTargets(atk,G.enemies);
  if(!targets.length)return;

  const AX=window.MWArenaThree;
  const specAll=ab.target==='all'&&String(ab.type||'').toLowerCase()==='special'&&AX;

  if(specAll){
    const packs=[];
    for(const t of targets){
      packs.push({t,r:calcDmg(atk,t,ab.dmg||1.0,ab.ignoreDef)});
    }
    for(const {t,r} of packs){
      if(r.evaded){
        if(AX){AX.flashUnitById(t.id);AX.popOnUnit(t.id,'EVADE','miss')}
        lg(`<span class="actor">${atk.name}</span> → ${t.name}: <span class="ct">EVADE</span>`,'pa');
      }else if(r.damage===0){
        if(AX){AX.flashUnitById(t.id);AX.popOnUnit(t.id,'BLOCK','block')}
        lg(`<span class="actor">${atk.name}</span> → ${t.name}: BLOCKED`,'pa');
      }else{
        t.hp=Math.max(0,t.hp-r.damage);G.dd+=r.damage;
        screenFlash();
        lg(`<span class="actor">${atk.name}</span> → ${t.name}: <span class="dt">-${r.damage}</span>${r.crit?' <span class="ct">CRIT!</span>':''}`,'pa');
        if(ab.lifesteal&&r.damage>0){const h=Math.round(r.damage*ab.lifesteal);atk.hp=Math.min(atk.maxHp,atk.hp+h);if(AX)AX.popOnUnit(atk.id,'+'+h,'heal')}
      }
    }
    renderUnits();
    const hitPacks=packs.filter(x=>!x.r.evaded&&x.r.damage>0);
    if(hitPacks.length&&AX)await AX.playSpecialAoeVisual(atk,ab,hitPacks,'player');
    for(const {t,r} of packs){
      if(!r.evaded&&r.damage>0&&t.hp<=0&&AX)await AX.maybeDeathAnim(t,'enemy');
      if(t.hp<=0){
        lg(`${t.name} has been <span class="dt">ELIMINATED</span>!`,'sys');
        if(window.MWArenaStatus)MWArenaStatus.onKill(G.allies,atk);
      }
    }
    renderUnits();
    return;
  }

  for(const t of targets){
    const r=calcDmg(atk,t,ab.dmg||1.0,ab.ignoreDef);
    if(AX)AX.flashUnitById(t.id);await sl(120);
    if(r.evaded){
      if(AX)AX.popOnUnit(t.id,'EVADE','miss');
      lg(`<span class="actor">${atk.name}</span> → ${t.name}: <span class="ct">EVADE</span>`,'pa');
    }
    else if(r.damage===0){
      if(AX)AX.popOnUnit(t.id,'BLOCK','block');
      lg(`<span class="actor">${atk.name}</span> → ${t.name}: BLOCKED`,'pa');
    }
    else{
      t.hp=Math.max(0,t.hp-r.damage);G.dd+=r.damage;
      screenFlash();
      renderUnits();
      if(AX)await AX.playAttackVisual(atk,t,ab,r,'player');
      lg(`<span class="actor">${atk.name}</span> → ${t.name}: <span class="dt">-${r.damage}</span>${r.crit?' <span class="ct">CRIT!</span>':''}`,'pa');
      if(ab.lifesteal&&r.damage>0){const h=Math.round(r.damage*ab.lifesteal);atk.hp=Math.min(atk.maxHp,atk.hp+h);if(AX)AX.popOnUnit(atk.id,'+'+h,'heal')}
      if(t.hp<=0){
        if(AX)await AX.maybeDeathAnim(t,'enemy');
        lg(`${t.name} has been <span class="dt">ELIMINATED</span>!`,'sys');
        if(window.MWArenaStatus)MWArenaStatus.onKill(G.allies,atk);
      }
    }
    renderUnits();await sl(180);
  }
}

async function doHeal(u,ab){
  let targets=[];
  if(ab.target==='self')targets=[u];
  else if(ab.target==='lowest_ally'){const a=G.allies.filter(a=>a.hp>0).sort((a,b)=>a.hp/a.maxHp-b.hp/b.maxHp);targets=a.length?[a[0]]:[]}
  else if(ab.target==='all_allies')targets=G.allies.filter(a=>a.hp>0);
  else targets=[u];
  const AX=window.MWArenaThree;
  for(const t of targets){
    const h=Math.round(t.maxHp*ab.healPct);t.hp=Math.min(t.maxHp,t.hp+h);
    if(AX)await AX.playHealVisual(u,t,h,'player');
    lg(`<span class="actor">${u.name}</span> heals ${t.name}: <span class="ht">+${h}</span>`,'pa');
    renderUnits();await sl(200);
  }
}

/* ── TARGETING ── */
function getValidTargets(unit,enemies){
  const a=enemies.filter(e=>e.hp>0);if(!a.length)return[];
  const f=a.filter(e=>e.pos==='front'),m=a.filter(e=>e.pos==='mid'),b=a.filter(e=>e.pos==='back');
  const p=unit.pos;
  if(p==='front'){return f.length?[f[0]]:m.length?[m[0]]:b.length?[b[0]]:[]}
  if(p==='mid'){const t=[...f,...m];return t.length?[t[0]]:b.length?[b[0]]:[]}
  return a.length?[a[0]]:[];
}

function pickPrimaryEnemyForAbility(u,ab){
  if(ab.healPct)return null;
  if(ab.target==='all')return G.enemies.find(e=>e.hp>0)||null;
  if(ab.target==='any'){
    const pool=G.enemies.filter(e=>e.hp>0);
    if(G.pendingPickEnemy&&pool.some(e=>e.id===G.pendingPickEnemy.id))return G.pendingPickEnemy;
    return pool.length?pool.sort((a,b)=>a.hp-b.hp)[0]:null;
  }
  const ts=getValidTargets(u,G.enemies);
  return ts.length?ts[0]:null;
}
function enemySlotFromUnit(en){
  if(!en)return'front';
  const p=String(en.pos||'').toLowerCase();
  return(p==='front'||p==='mid'||p==='back')?p:'front';
}
/** Mapeo a acciones del motor simultáneo (skills MW requieren registro en servidor; hasta entonces ability/special ≈ attack). */
function buildSquadwarsActionsFromG(){
  const slots=['p1','p2','p3'];
  const out=[];
  for(let i=0;i<G.allies.length&&i<3;i++){
    const u=G.allies[i];
    const pid=slots[i];
    if(!u||u.hp<=0)continue;
    const ab=G.actions[u.id];
    if(!ab){
      out.push({unitId:pid,action:'attack',targetScope:'slot_enemy',targetSlot:'front'});
      continue;
    }
    const hasDmg=ab.dmg!=null&&Number(ab.dmg)>0;
    const hpct=ab.healPct!=null?Number(ab.healPct):0;
    if(!hasDmg&&hpct>0){
      const ec=ab.eCost!==undefined&&ab.eCost!==null?Number(ab.eCost):0;
      const ht=String(ab.healTarget||ab.target||'self').toLowerCase();
      let healTarget='self';
      if(ht==='lowest_ally'||ht==='lowest ally')healTarget='lowest_ally';
      else if(ht==='all_allies'||ht==='all allies')healTarget='all_allies';
      out.push({unitId:pid,action:'heal',healPct:hpct,healTarget,energyCost:ec});
      continue;
    }
    const en=pickPrimaryEnemyForAbility(u,ab);
    const slot=enemySlotFromUnit(en);
    const ec=ab.eCost!==undefined&&ab.eCost!==null?Number(ab.eCost):0;
    const atk={unitId:pid,action:'attack',targetScope:'slot_enemy',targetSlot:slot,energyCost:ec};
    if(hasDmg&&hpct>0){
      const ht=String(ab.healTarget||ab.target||'self').toLowerCase();
      let chainHealTarget='self';
      if(ht==='lowest_ally'||ht==='lowest ally')chainHealTarget='lowest_ally';
      else if(ht==='all_allies'||ht==='all allies')chainHealTarget='all_allies';
      atk.chainHealPct=hpct;
      atk.chainHealTarget=chainHealTarget;
    }
    out.push(atk);
  }
  return out;
}

/** IDs de estado servidor (p1–p3 / e1–e3) → unidad en G (mismo orden que bootstrap). */
function swUnitByServerId(sid){
  const m={p1:G.allies[0],p2:G.allies[1],p3:G.allies[2],e1:G.enemies[0],e2:G.enemies[1],e3:G.enemies[2]};
  return m[String(sid||'')]||null;
}

/** Durante playback SquadWars: el daño real viene del servidor al final de ronda; aquí bajamos G.hp al vuelo para barras/HUD. */
async function swPlaybackApplyDamageToUnit(tgt,dmg){
  if(!tgt)return;
  const v=Math.max(0,Math.round(Number(dmg)||0));
  if(v<=0)return;
  const cur=Math.max(0,Math.round(Number(tgt.hp)||0));
  tgt.hp=Math.max(0,cur-v);
  if(window.MWArenaThree&&typeof MWArenaThree.syncFromG==='function')MWArenaThree.syncFromG(G);
  if(typeof buildHUD==='function')buildHUD();
  if(tgt.hp<=0&&window.MWArenaThree&&typeof MWArenaThree.maybeDeathAnim==='function'){
    await MWArenaThree.maybeDeathAnim(tgt,tgt.isEnemy?'enemy':'player');
  }
}
function swPlaybackApplyHealToUnit(tgt,amt){
  if(!tgt)return;
  const v=Math.max(0,Math.round(Number(amt)||0));
  if(v<=0)return;
  const mh=Math.max(1,Math.round(Number(tgt.maxHp)||1));
  const cur=Math.max(0,Math.round(Number(tgt.hp)||0));
  tgt.hp=Math.min(mh,cur+v);
  if(window.MWArenaThree&&typeof MWArenaThree.syncFromG==='function')MWArenaThree.syncFromG(G);
  if(typeof buildHUD==='function')buildHUD();
}

/** Reproduce VFX a partir de eventos del motor (timeline fija + SFX por categoría attack/heal/special). */
async function playbackSquadwarsEvents(events){
  const AX=window.MWArenaThree;
  const TL=window.MW_SW_TIMELINE||{};
  const list=Array.isArray(events)?events:[];
  if(!list.length)return;
  for(let i=0;i<list.length;i++){
    const ev=list[i];
    if(!ev||typeof ev!=='object')continue;
    const typ=String(ev.type||'');
    if(typ==='energy'||typ==='synergy_trigger')continue;
    if(typ==='actor_turn'){
      G.swPlaybackActiveId=String(ev.unitId||'');
      if(typeof renderTurnOrder==='function')renderTurnOrder();
      await sl(38);
      continue;
    }
    if(typ==='action_lost_control'){
      const u=swUnitByServerId(ev.unitId);
      const nm=u?(u.name||'?'):String(ev.unitId||'?');
      lg(`<span class="actor">${escHtml(nm)}</span> <span class="dt">no actúa</span> (stun/freeze/bloqueo)`,'sys');
      await sl(48);
      continue;
    }
    if(typ==='bleed_tick'){
      const tgt=swUnitByServerId(ev.unitId);
      const v=Number(ev.value)||0;
      await sl(36);
      if(tgt&&AX){
        AX.flashUnitById(tgt.id);
        AX.popOnUnit(tgt.id,'-'+v,'damage');
      }
      await swPlaybackApplyDamageToUnit(tgt,v);
      if(tgt)lg(`<span class="actor">${escHtml(tgt.name||'?')}</span> bleed: <span class="dt">-${v}</span>`,'pa');
      await sl(72);
      continue;
    }
    if(typ==='regen_tick'){
      const tgt=swUnitByServerId(ev.unitId);
      const v=Number(ev.value)||0;
      await sl(32);
      if(tgt&&AX)AX.popOnUnit(tgt.id,'+'+v,'heal');
      swPlaybackApplyHealToUnit(tgt,v);
      if(tgt)lg(`<span class="actor">${escHtml(tgt.name||'?')}</span> regen: <span class="ht">+${v}</span>`,'pa');
      await sl(58);
      continue;
    }
    if(typ==='damage'){
      const tgt=swUnitByServerId(ev.target);
      const src=swUnitByServerId(ev.source);
      const v=Number(ev.value)||0;
      const crit=!!ev.crit;
      const seg=crit?(TL.dmgCrit||TL.dmg||{}):(TL.dmg||{});
      const pre=seg.pre!=null?seg.pre:140;
      const post=seg.post!=null?seg.post:220;
      await sl(pre);
      if(AX&&src&&tgt&&typeof AX.playAttackVisual==='function'){
        const side=!src.isEnemy?'player':'enemy';
        const abStub={type:'attack',name:'Strike'};
        await AX.playAttackVisual(src,tgt,abStub,{damage:v,crit,evaded:false},side,{skipHpApply:true});
        await swPlaybackApplyDamageToUnit(tgt,v);
      }else{
        if(window.MWArenaSFX){
          window.MWArenaSFX.unlock();
          if(crit)window.MWArenaSFX.playCrit();
          else if(typeof window.MWArenaSFX.playAttack==='function')window.MWArenaSFX.playAttack();
          else window.MWArenaSFX.playHit(0.82);
        }
        if(AX&&src&&tgt&&typeof AX.focusStrikeCamera==='function')await AX.focusStrikeCamera(src,tgt,{crit});
        if(tgt&&AX){
          AX.flashUnitById(tgt.id);
          await sl(crit?100:78);
          AX.popOnUnit(tgt.id,'-'+v,'damage');
        }
        await swPlaybackApplyDamageToUnit(tgt,v);
      }
      if(src&&tgt)lg(`<span class="actor">${(src.name||'?')}</span> → ${tgt.name}: <span class="dt">-${v}</span>${crit?' <span class="ct">CRIT</span>':''}`,'pa');
      await sl(post);
    }else if(typ==='heal'){
      const tgt=swUnitByServerId(ev.targetUnitId||ev.target);
      const src=swUnitByServerId(ev.sourceUnitId||ev.source);
      const v=Number(ev.value)||0;
      const hpre=(TL.heal&&TL.heal.pre!=null)?TL.heal.pre:95;
      const hpost=(TL.heal&&TL.heal.post!=null)?TL.heal.post:140;
      await sl(hpre);
      if(window.MWArenaSFX)window.MWArenaSFX.unlock();
      if(tgt&&AX&&src){
        await AX.playHealVisual(src,tgt,v,(tgt.isEnemy?'enemy':'player'));
        lg(`<span class="actor">${(src.name||'?')}</span> heals ${tgt.name}: <span class="ht">+${v}</span>`,'pa');
      }else if(tgt&&AX){
        AX.popOnUnit(tgt.id,'+'+v,'heal');
      }
      swPlaybackApplyHealToUnit(tgt,v);
      await sl(hpost);
    }else if(typ==='death'){
      const preD=(TL.death&&TL.death.pre!=null)?TL.death.pre:90;
      const postD=(TL.death&&TL.death.post!=null)?TL.death.post:280;
      await sl(preD);
      const u=swUnitByServerId(ev.unitId);
      if(u){
        u.hp=0;
        if(window.MWArenaThree&&typeof MWArenaThree.syncFromG==='function')MWArenaThree.syncFromG(G);
        if(typeof buildHUD==='function')buildHUD();
      }
      /* SFX + disolución en executeUnitDeath; si el daño previo ya animó muerte, maybeDeathAnim sale al instante. */
      if(u&&AX)await AX.maybeDeathAnim(u,u.isEnemy?'enemy':'player');
      await sl(postD);
    }
  }
  G.swPlaybackActiveId='';
  if(typeof renderTurnOrder==='function')renderTurnOrder();
  if(AX&&typeof AX.resetStrikeCamera==='function')await AX.resetStrikeCamera();
}

/** Si hay batalla persistida SquadWars, el único árbitro de daño/turnos es el servidor — no mezclar con calcDmg/aiTurn. */
async function squadwarsTryResyncVm(){
  const api=window.KND_SQUADWARS_API;
  const vm=window.__SQUADWARS_VM;
  if(!api||!vm)return;
  try{
    const r=await fetch(api.getBattleStateUrl,{credentials:'same-origin'});
    const j=await r.json().catch(()=>null);
    if(j&&j.ok&&j.data){
      const d=j.data;
      vm.round=Number(d.round)||vm.round;
      vm.version=Number(d.stateVersion)||vm.version;
      if(d.state)applyServerUnitsToG(d.state);
      lg('<span class="ht">Estado alineado con el servidor. Vuelve a confirmar acciones.</span>','sys');
    }
  }catch(e){console.warn('[SquadWars] resync',e);}
}
async function squadwarsRecoverSubmitFailure(j,httpStatus){
  G.phase='select';
  const btn=document.getElementById('send-btn');
  if(btn)btn.classList.add('rdy');
  const code=(j&&j.error&&j.error.code)?String(j.error.code):'';
  const msg=(j&&j.error&&j.error.message)?String(j.error.message):'submit_round rechazado';
  lg('<span class="dt">SquadWars '+escHtml(code||String(httpStatus||'ERR'))+': '+escHtml(msg)+'</span>','sys');
  await squadwarsTryResyncVm();
  renderUnits();buildHUD();updateConfirm();
}

async function executeTurnSquadwarsServer(){
  const api=window.KND_SQUADWARS_API;
  const vm=window.__SQUADWARS_VM;
  if(!api||!vm){
    lg('<span class="dt">SquadWars API no inicializada. Recarga el battlefield.</span>','sys');
    G.phase='select';
    const b=document.getElementById('send-btn');
    if(b)b.classList.add('rdy');
    return;
  }
  G.phase='anim';
  document.getElementById('send-btn').classList.remove('rdy');
  G.pendingPickEnemy=null;
  if(window.MWArenaThree)MWArenaThree.setEnemyPickMode(false);
  if(window.MWArenaSFX)MWArenaSFX.playConfirm();
  const usedAllyAbilities=new Map();
  G.allies.forEach(function(u){
    if(!u||u.hp<=0)return;
    const ab=G.actions[u.id];
    if(ab)usedAllyAbilities.set(u.id,ab);
  });
  const actions=buildSquadwarsActionsFromG();
  try{
    const r=await fetch(api.submitRoundUrl,{
      method:'POST',
      credentials:'same-origin',
      headers:{'Content-Type':'application/json','X-CSRF-Token':api.csrfToken},
      body:JSON.stringify({
        battle_token:api.battleToken,
        round:vm.round,
        actions:actions,
        clientStateVersion:vm.version,
        csrf_token:api.csrfToken
      })
    });
    const j=await r.json().catch(()=>null);
    if(!j||!j.ok||!j.data){
      console.warn('[SquadWars] submit failed',j);
      await squadwarsRecoverSubmitFailure(j,r.status);
      return;
    }
    const d=j.data;
    vm.version=Number(d.stateVersion)||vm.version;
    vm.round=Number(d.nextSubmitRound)||(vm.round+1);
    if(Array.isArray(d.timelineUsed)&&d.timelineUsed.length){
      G.swLastTimeline=d.timelineUsed.map(function(x){return String(x);});
    }
    if(typeof renderTurnOrder==='function')renderTurnOrder();
    await playbackSquadwarsEvents(d.events);
    const r2=await fetch(api.getBattleStateUrl,{credentials:'same-origin'});
    const j2=await r2.json().catch(()=>null);
    if(j2&&j2.ok&&j2.data&&j2.data.state){
      applyServerUnitsToG(j2.data.state);
      vm.version=Number(j2.data.stateVersion)||vm.version;
      vm.round=Number(j2.data.round)||vm.round;
    }
    usedAllyAbilities.forEach(function(ab){
      if(ab&&ab.maxCd>0)ab.cd=ab.maxCd;
    });
    lg('<span class="sys">══ Round resolved (server) ══</span>','sys');
    if(d.battleOver){
      G.phase='done';
      const won=String(d.winner||'')==='player';
      setTimeout(function(){showResult(won);},500);
      return;
    }
  }catch(err){
    console.warn('[SquadWars] submit error',err);
    await squadwarsRecoverSubmitFailure(null,0);
    return;
  }
  G.allies.forEach(a=>{a.abilities.forEach(s=>{if(s.cd>0)s.cd--})});
  G.actions={};
  G.enemies.forEach(e=>{e.defending=false});
  if(checkEnd())return;
  G.round++;
  G.turn='player';
  G.phase='select';
  document.getElementById('tl').textContent='YOUR TURN';
  document.getElementById('tl').style.color='var(--c)';
  document.getElementById('rl').textContent='ROUND '+G.round;
  showPh('ROUND '+G.round);
  if(window.MWArenaSFX)MWArenaSFX.playRoundStart();
  G.enemies.forEach(a=>{a.abilities.forEach(s=>{if(s.cd>0)s.cd--})});
  renderUnits();buildHUD();updateConfirm();
}

/* ── ENEMY AI ── */
async function aiTurn(){
  const AX=window.MWArenaThree;
  const order=[...G.enemies.filter(e=>e.hp>0)].sort((a,b)=>b.speed-a.speed);
  for(const en of order){
    if(!G.allies.filter(a=>a.hp>0).length)break;
    const usable=en.abilities.filter(s=>{
      if(s.passive||s.cd>0)return false;
      const c=s.eCost!==undefined&&s.eCost!==null?Number(s.eCost):0;
      return c<=en.energy;
    });if(!usable.length)continue;
    const low=en.hp/en.maxHp<.35;const heals=usable.filter(s=>s.healPct);
    const dmgers=usable.filter(s=>s.dmg);
    let ab=low&&heals.length?heals[0]:(dmgers.length?dmgers[~~(Math.random()*dmgers.length)]:usable[0]);
    await sl(250);
    const hasHeal=ab.healPct!=null&&Number(ab.healPct)>0;
    const hasDmg=ab.dmg!=null&&Number(ab.dmg)>0;
    if(hasHeal){
        let tgts=ab.target==='self'?[en]:ab.target==='lowest_ally'?[G.enemies.filter(e=>e.hp>0).sort((a,b)=>a.hp/a.maxHp-b.hp/b.maxHp)[0]]:
          ab.target==='all_allies'?G.enemies.filter(e=>e.hp>0):[en];
        for(const t of tgts){
          if(!t)continue;
          const h=Math.round(t.maxHp*ab.healPct);t.hp=Math.min(t.maxHp,t.hp+h);
          if(AX)await AX.playHealVisual(en,t,h,'enemy');
          lg(`<span class="actor">${en.name}</span> heals ${t.name}: <span class="ht">+${h}</span>`,'ea');
          renderUnits();await sl(200);
        }
      }
      if(hasDmg){
      let tgts=ab.target==='all'?G.allies.filter(a=>a.hp>0):ab.target==='any'?[G.allies.filter(a=>a.hp>0).sort((a,b)=>a.hp-b.hp)[0]].filter(Boolean):getValidTargets(en,G.allies);
      const specAll=ab.target==='all'&&String(ab.type||'').toLowerCase()==='special'&&AX;
      if(specAll){
        const packs=[];
        for(const t of tgts)packs.push({t,r:calcDmg(en,t,ab.dmg||1.0,ab.ignoreDef)});
        for(const {t,r} of packs){
          if(r.evaded){
            if(AX){AX.flashUnitById(t.id);AX.popOnUnit(t.id,'EVADE','miss')}
            lg(`<span class="actor">${en.name}</span> → ${t.name}: <span class="ct">EVADE</span>`,'ea');
          }else if(r.damage===0){
            if(AX){AX.flashUnitById(t.id);AX.popOnUnit(t.id,'BLOCK','block')}
            lg(`<span class="actor">${en.name}</span> → ${t.name}: BLOCKED`,'ea');
          }else{
            t.hp=Math.max(0,t.hp-r.damage);G.dt+=r.damage;screenFlash();
            lg(`<span class="actor">${en.name}</span> → ${t.name}: <span class="dt">-${r.damage}</span>${r.crit?' <span class="ct">CRIT!</span>':''}`,'ea');
            if(ab.lifesteal&&r.damage>0){const h=Math.round(r.damage*ab.lifesteal);en.hp=Math.min(en.maxHp,en.hp+h);if(AX)AX.popOnUnit(en.id,'+'+h,'heal')}
          }
        }
        renderUnits();
        const hitPacks=packs.filter(x=>!x.r.evaded&&x.r.damage>0);
        if(hitPacks.length&&AX)await AX.playSpecialAoeVisual(en,ab,hitPacks,'enemy');
        for(const {t,r} of packs){
          if(!r.evaded&&r.damage>0&&t.hp<=0&&AX)await AX.maybeDeathAnim(t,'player');
          if(t.hp<=0)lg(`${t.name} <span class="dt">ELIMINATED</span>!`,'sys');
        }
        renderUnits();
      } else {
        for(const t of tgts){
          const r=calcDmg(en,t,ab.dmg||1.0,ab.ignoreDef);
          if(AX)AX.flashUnitById(t.id);await sl(120);
          if(r.evaded){
            if(AX)AX.popOnUnit(t.id,'EVADE','miss');
            lg(`<span class="actor">${en.name}</span> → ${t.name}: <span class="ct">EVADE</span>`,'ea');
          }else if(r.damage===0){
            if(AX)AX.popOnUnit(t.id,'BLOCK','block');
            lg(`<span class="actor">${en.name}</span> → ${t.name}: BLOCKED`,'ea');
          }else{
            t.hp=Math.max(0,t.hp-r.damage);G.dt+=r.damage;screenFlash();
            renderUnits();
            if(AX)await AX.playAttackVisual(en,t,ab,r,'enemy');
            lg(`<span class="actor">${en.name}</span> → ${t.name}: <span class="dt">-${r.damage}</span>${r.crit?' <span class="ct">CRIT!</span>':''}`,'ea');
            if(ab.lifesteal&&r.damage>0){const h=Math.round(r.damage*ab.lifesteal);en.hp=Math.min(en.maxHp,en.hp+h);if(AX)AX.popOnUnit(en.id,'+'+h,'heal')}
            if(t.hp<=0){
              if(AX)await AX.maybeDeathAnim(t,'player');
              lg(`${t.name} <span class="dt">ELIMINATED</span>!`,'sys');
            }
          }
          renderUnits();await sl(180);
        }
      }
    }
    if(ab.maxCd>0)ab.cd=ab.maxCd;
    const ep=ab.eCost!==undefined&&ab.eCost!==null?Number(ab.eCost):0;
    en.energy=Math.min(MW.MAX_ENERGY,en.energy-ep+MW.E_GAIN_ATK);
    renderUnits();await sl(300);
  }
  G.allies.forEach(a=>{a.defending=false});
}

/* ── CHECK END ── */
function checkEnd(){
  if(!G.enemies.filter(e=>e.hp>0).length){G.phase='done';setTimeout(()=>showResult(true),600);return true}
  if(!G.allies.filter(a=>a.hp>0).length){G.phase='done';setTimeout(()=>showResult(false),600);return true}
  return false}

/* ── RESULT — sync rewards with Mind Wars (pve_submit-equivalent) when PHP boot provides tokens ── */
let squadRewardsSubmitDone=false;
async function submitSquadBattleResult(win){
  if(squadRewardsSubmitDone)return null;
  const b=window.__MW_BATTLE_INIT__;
  if(!b||!b.battleToken||!b.csrfToken)return null;
  squadRewardsSubmitDone=true;
  const url=b.submitResultUrl||'/squad-arena-v2/api/submit_result.php';
  try{
    const r=await fetch(url,{
      method:'POST',
      credentials:'same-origin',
      headers:{'Content-Type':'application/json','X-CSRF-Token':String(b.csrfToken)},
      body:JSON.stringify({
        battle_token:String(b.battleToken),
        result:win?'win':'lose',
        rounds:G.round,
        dmg_dealt:G.dd,
        dmg_taken:G.dt
      })
    });
    const j=await r.json().catch(()=>null);
    if(j&&j.ok&&j.data&&j.data.rewards)return j.data.rewards;
  }catch(err){console.warn('submitSquadBattleResult',err)}
  return null;
}
async function showResult(w){
  if(window.MWArenaSFX){MWArenaSFX.stopMusic();if(w)MWArenaSFX.playVictory();else MWArenaSFX.playDefeat();}
  const srv=await submitSquadBattleResult(w);
  const o=document.getElementById('eg');
  o.classList.add('show',w?'win':'lose');
  o.style.setProperty('--egc',w?'var(--c)':'var(--m)');

  const xp=srv?~~Number(srv.xp):(w?~~(20+G.round*2):~~(8+G.round));
  const rk=srv?~~Number(srv.rank):(w?20:-5);
  const ke=srv?~~Number(srv.knowledge_energy):(w?10:4);
  const quotes=w?[
    "Your neural pathways evolved beyond comprehension.",
    "The void bows to your strategic supremacy.",
    "Every dimension collapsed in your favor.",
    "Signal integrity: absolute. Victory: inevitable."
  ]:[
    "Your neural link was severed before adaptation.",
    "The void consumed your strategy whole.",
    "Recalibrate. Rebuild. Return stronger.",
    "Even the brightest signals fade — temporarily."
  ];

  /* ── CONFETTI (victory) or ASH PARTICLES (defeat) ── */
  const confettiEl=document.getElementById('eg-confetti');
  confettiEl.innerHTML='';
  if(w){
    const colors=['#00f0ff','#d400ff','#ffc820','#00ff88','#ff2244','#ffffff'];
    for(let i=0;i<60;i++){
      const p=document.createElement('div');
      p.className='confetti-p';
      p.style.cssText=`left:${Math.random()*100}%;top:-10px;width:${4+Math.random()*6}px;height:${6+Math.random()*10}px;background:${colors[~~(Math.random()*colors.length)]};border-radius:${Math.random()>0.5?'50%':'1px'};--dur:${2+Math.random()*3}s;--delay:${Math.random()*1.5}s;--rot:${360+Math.random()*720}deg;`;
      confettiEl.appendChild(p);
    }
  } else {
    for(let i=0;i<30;i++){
      const p=document.createElement('div');
      p.className='confetti-p';
      p.style.cssText=`left:${Math.random()*100}%;top:-10px;width:${2+Math.random()*3}px;height:${2+Math.random()*3}px;background:rgba(${150+~~(Math.random()*60)},${50+~~(Math.random()*40)},${80+~~(Math.random()*40)},0.6);border-radius:50%;--dur:${4+Math.random()*4}s;--delay:${Math.random()*2}s;--rot:${Math.random()*360}deg;`;
      confettiEl.appendChild(p);
    }
  }

  /* ── STAGGERED REVEAL ── */
  const icon=document.getElementById('egi');
  const title=document.getElementById('egr');
  const sub=document.getElementById('egs');
  const div1=document.getElementById('egd1');
  const statsEl=document.getElementById('egst');
  const div2=document.getElementById('egd2');
  const xpWrap=document.getElementById('egxp');
  const xpFill=document.getElementById('egxpf');
  const xpVal=document.getElementById('egxpv');
  const rwEl=document.getElementById('egrw');
  const quoteEl=document.getElementById('egq');
  const btnsEl=document.getElementById('egbtns');
  const blEl=document.getElementById('egbl');

  /* Reset all animations */
  [icon,title,sub,div1,div2,xpWrap,quoteEl,btnsEl,blEl].forEach(el=>{if(el)el.classList.remove('anim')});

  /* Icon + Title: 200ms — sin calavera en derrota */
  if(w){
    icon.style.display='';
    icon.textContent='⚡';
    setTimeout(()=>icon.classList.add('anim'),200);
  }else{
    icon.style.display='none';
    icon.textContent='';
    icon.classList.remove('anim');
  }

  title.textContent=w?'VICTORY':'DEFEAT';
  setTimeout(()=>title.classList.add('anim'),400);

  sub.textContent=w?'YOUR SIGNAL RESONATES ACROSS THE VOID':'YOUR SIGNAL HAS BEEN SEVERED';
  setTimeout(()=>sub.classList.add('anim'),650);

  /* Divider 1 */
  setTimeout(()=>div1.classList.add('anim'),850);

  /* Stats — appear one by one with counting animation */
  const statData=[
    {v:G.round,l:'ROUNDS'},
    {v:G.dd,l:'DMG DEALT'},
    {v:G.dt,l:'DMG TAKEN'}
  ];
  statsEl.innerHTML='';
  statData.forEach((s,i)=>{
    const si=document.createElement('div');
    si.className='eg-si';
    si.innerHTML=`<div class="eg-sv" id="egsv${i}">0</div><div class="eg-sl">${s.l}</div>`;
    statsEl.appendChild(si);
    setTimeout(()=>{
      si.classList.add('anim');
      /* Count up animation */
      const target=s.v;
      const svEl=document.getElementById('egsv'+i);
      const countDur=600;
      const t0=performance.now();
      function tick(){
        const p=Math.min((performance.now()-t0)/countDur,1);
        const ease=1-Math.pow(1-p,3);
        svEl.textContent=Math.round(target*ease).toLocaleString();
        if(p<1)requestAnimationFrame(tick);
      }
      tick();
      if(window.MWArenaSFX)MWArenaSFX.playSelect();
    },1000+i*200);
  });

  /* Divider 2 */
  setTimeout(()=>div2.classList.add('anim'),1650);

  /* XP Bar — fill animation */
  xpFill.style.width='0%';
  xpFill.classList.toggle('lose',!w);
  xpVal.textContent='+0 XP';
  setTimeout(()=>{
    xpWrap.classList.add('anim');
    setTimeout(()=>{
      const maxXP=100;
      const pct=Math.min(100,(xp/maxXP)*100);
      xpFill.style.width=pct+'%';
      /* Count up XP number */
      const t0=performance.now();
      function tickXP(){
        const p=Math.min((performance.now()-t0)/1200,1);
        const ease=1-Math.pow(1-p,3);
        xpVal.textContent='+'+Math.round(xp*ease)+' XP';
        if(p<1)requestAnimationFrame(tickXP);
      }
      tickXP();
    },150);
  },1800);

  /* Rewards — pop in one by one */
  rwEl.innerHTML='';
  const rewards=[
    {icon:'✨',val:'+'+xp,cls:'xp',label:'XP'},
    {icon:'',val:(rk>0?'+':'')+rk,cls:'rk',label:'RANK'},
    {icon:'⚡',val:'+'+ke,cls:'ke',label:'KE'}
  ];
  rewards.forEach((r,i)=>{
    const ri=document.createElement('div');
    ri.className='eg-ri';
    ri.innerHTML=`<span class="eg-ri-icon">${r.icon}</span> <span class="eg-rv ${r.cls}">${r.val}</span> ${r.label}`;
    rwEl.appendChild(ri);
    setTimeout(()=>{
      ri.classList.add('anim');
      if(window.MWArenaSFX)MWArenaSFX.playSelect();
    },2400+i*180);
  });

  /* Quote — typewriter effect */
  const chosenQuote=quotes[~~(Math.random()*quotes.length)];
  quoteEl.textContent='';
  setTimeout(()=>{
    quoteEl.classList.add('anim');
    quoteEl.textContent='"';
    let ci=0;
    function typeChar(){
      if(ci<chosenQuote.length){
        quoteEl.textContent='"'+chosenQuote.substring(0,ci+1);
        ci++;
        setTimeout(typeChar,25+Math.random()*15);
      } else {
        quoteEl.textContent='"'+chosenQuote+'"';
      }
    }
    typeChar();
  },3100);

  /* Buttons + bottom line */
  setTimeout(()=>btnsEl.classList.add('anim'),3800);
  setTimeout(()=>blEl.classList.add('anim'),3900);
}

/* ── FX ── */
function flash(id){if(window.MWArenaThree)MWArenaThree.flashUnitById(id)}
function screenFlash(){const s=document.getElementById('sf');s.classList.add('pop');setTimeout(()=>s.classList.remove('pop'),80)}
function pop(id,t,ty){if(window.MWArenaThree)MWArenaThree.popOnUnit(id,t,ty)}
function showPh(t){const o=document.getElementById('phov');document.getElementById('phtx').textContent=t;o.classList.add('show');setTimeout(()=>o.classList.remove('show'),950)}
function lg(m,ty='sys'){const c=document.getElementById('clog');const e=document.createElement('div');e.className='cle '+ty;
  e.innerHTML=`<span class="trn">R${G.round}</span>`+m;c.appendChild(e);while(c.children.length>8)c.removeChild(c.firstChild);
  Array.from(c.children).forEach((el,i,a)=>{el.style.opacity=.25+(i/a.length)*.75})}
function sl(ms){return new Promise(r=>setTimeout(r,ms))}
function goLobby(){window.location.href='/squad-arena-v2/squad-selector.php'}

init();

(function initVsStars(){
  var c=document.getElementById('vs-stars-canvas');
  if(!c)return;
  var ctx=c.getContext('2d');
  var stars=[];
  function resize(){
    c.width=window.innerWidth;
    c.height=window.innerHeight;
  }
  function spawn(){
    return{
      x:Math.random()*c.width,
      y:Math.random()*c.height*0.7,
      r:Math.random()*1.4+0.4,
      a:Math.random()*0.5+0.1,
      speed:Math.random()*0.008+0.004,
      phase:Math.random()*Math.PI*2
    };
  }
  resize();
  window.addEventListener('resize',resize);
  for(var i=0;i<70;i++)stars.push(spawn());
  var frame;
  function draw(){
    ctx.clearRect(0,0,c.width,c.height);
    var t=Date.now()/1000;
    stars.forEach(function(s){
      var alpha=s.a*(0.4+0.6*Math.sin(t*s.speed*20+s.phase));
      ctx.beginPath();
      ctx.arc(s.x,s.y,s.r,0,Math.PI*2);
      ctx.fillStyle='rgba(200,240,255,'+alpha+')';
      ctx.fill();
    });
    var vsEl=document.getElementById('vs-intro');
    if(vsEl&&vsEl.style.display!=='none'){
      frame=requestAnimationFrame(draw);
    }else{
      if(frame)cancelAnimationFrame(frame);
    }
  }
  draw();
})();
