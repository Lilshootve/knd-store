<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>MIND WARS — Squad Arena 3v3</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700;900&family=Rajdhani:wght@300;400;500;600;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
/*══════════════════════════════════════════════════════════════════
  RESET & ROOT — canonical KND palette from mind-wars-arena.php
══════════════════════════════════════════════════════════════════*/
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
  --void:#010508;--deep:#020a10;--surface:#05111a;--surface2:#071520;
  --c:#00e8ff;--c2:#00a8bb;--cg:rgba(0,232,255,.12);--cb:rgba(0,232,255,.22);
  --m:#9b30ff;--m2:#6b00cc;--mg:rgba(155,48,255,.15);--mb:rgba(155,48,255,.28);
  --gold:#ffd600;--goldg:rgba(255,214,0,.12);
  --green:#00ff88;--greeng:rgba(0,255,136,.12);
  --red:#ff3d56;--redg:rgba(255,61,86,.12);
  --orange:#ff8800;
  --t1:rgba(220,248,255,.95);--t2:rgba(155,215,235,.65);--t3:rgba(90,165,190,.42);--t4:rgba(60,120,145,.22);
  --FD:'Orbitron',monospace;--FB:'Rajdhani',sans-serif;--FM:'Share Tech Mono',monospace;
  --r:6px;--r2:10px;--tr:.18s ease;
  /* Rarity (inline AT + cards) */
  --r-common:#4a7a8a;--r-special:#1aaa6a;--r-rare:#1a6aee;--r-epic:#c040ff;--r-legendary:#ffc030;
  /* Ability types */
  --t-passive:#4a9aff;--t-ability:#00e8ff;--t-special:#9b30ff;--t-heal:#20e080;--t-attack:#ff4060;--t-defense:#40c0ff;
}
html,body{height:100%;overflow:hidden}
body{background:var(--void);color:var(--t1);font-family:var(--FB);cursor:default;user-select:none}
body::after{content:'';position:fixed;inset:0;pointer-events:none;z-index:9999;
  background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,.03) 2px,rgba(0,0,0,.03) 3px)}

#app{width:100%;height:100vh;display:flex;flex-direction:column;overflow:hidden}

/*══════════════════════════════════════════════════════════════════
  LOBBY TOPBAR (injected by battlefield.php) + turn / round strip
══════════════════════════════════════════════════════════════════*/
header.topbar{flex-shrink:0}
#battle-hud-strip{
  display:flex;flex-direction:row;flex-wrap:wrap;align-items:center;justify-content:center;
  gap:8px 12px;
  padding:8px max(14px, env(safe-area-inset-right,0)) 8px max(14px, env(safe-area-inset-left,0));
  background:linear-gradient(180deg,rgba(1,5,12,.98) 0%,rgba(2,10,20,.88) 100%);
  border-bottom:1px solid rgba(0,232,255,.08);
  min-height:44px;z-index:19;flex-shrink:0;position:relative;
}
#battle-hud-strip::after{content:'';position:absolute;bottom:0;left:0;right:0;height:1px;
  background:linear-gradient(90deg,transparent 2%,rgba(0,232,255,.5) 25%,rgba(155,48,255,.7) 50%,rgba(0,232,255,.5) 75%,transparent 98%);opacity:.85}
.bhs-center{
  display:flex;flex-direction:column;align-items:center;gap:2px;
  flex:1 1 auto;min-width:0;justify-content:center;
}
#battle-hud-strip .surrender-btn-arena,
#battle-hud-strip #surrender-btn{
  margin:0!important;flex-shrink:0;align-self:center;
}
#tl{
  font-family:var(--FD);font-size:11px;font-weight:900;letter-spacing:.35em;
  text-shadow:0 0 18px rgba(0,232,255,.5);position:relative;
}
#tl::before,#tl::after{
  content:'⬡';position:absolute;top:50%;transform:translateY(-50%);
  font-size:8px;opacity:.45;color:inherit;
}
#tl::before{left:-18px}
#tl::after{right:-18px}
#rl{font-family:var(--FM);font-size:8px;letter-spacing:.18em;color:var(--t3);margin-top:1px}

/* Passive passives strip (3000 look) */
#passive-bar{
  display:flex;flex-wrap:wrap;align-items:center;justify-content:center;gap:8px 14px;
  padding:5px max(12px, env(safe-area-inset-right,0)) 6px max(12px, env(safe-area-inset-left,0));
  background:rgba(2,10,22,.72);border-bottom:1px solid rgba(0,232,255,.06);
  min-height:28px;z-index:18;flex-shrink:0;
}
#passive-bar:empty{display:none}
.pab{
  display:flex;align-items:center;gap:6px;font-family:var(--FM);font-size:8px;letter-spacing:.06em;
  color:var(--t3);padding:3px 8px;border-radius:var(--r);
  background:rgba(0,232,255,.04);border:1px solid rgba(0,232,255,.1);
}
.pab-dot{width:5px;height:5px;border-radius:50%;flex-shrink:0}
.pab-name{color:var(--t2);font-weight:600}
.pab-desc{color:var(--t4);max-width:200px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

/* Vertical arena divider — above 3D canvas, below chrome HUD */
#arena-divider{
  position:absolute;top:0;bottom:0;left:50%;width:1px;transform:translateX(-50%);
  z-index:5;pointer-events:none;
  background:linear-gradient(180deg,transparent 6%,rgba(0,232,255,.12) 22%,rgba(155,48,255,.14) 50%,rgba(0,232,255,.12) 78%,transparent 94%);
  box-shadow:0 0 12px rgba(0,232,255,.06);
}

/* Turn order strip (before ability HUD) */
#turn-order{
  flex-shrink:0;display:flex;align-items:center;gap:12px;z-index:19;
  padding:5px max(14px, env(safe-area-inset-right,0)) 5px max(14px, env(safe-area-inset-left,0));
  background:linear-gradient(90deg,rgba(2,10,22,.88),rgba(5,17,26,.75),rgba(2,10,22,.88));
  border-top:1px solid rgba(0,232,255,.06);border-bottom:1px solid rgba(155,48,255,.08);
}
#to-lbl{
  font-family:var(--FD);font-size:7px;font-weight:700;letter-spacing:.28em;color:var(--t4);
  flex-shrink:0;white-space:nowrap;
}
#to-units{display:flex;flex-wrap:wrap;align-items:center;gap:6px 4px;flex:1;min-width:0;justify-content:flex-end}
.to-unit{
  font-family:var(--FM);font-size:8px;letter-spacing:.12em;padding:3px 8px;border-radius:var(--r);
  color:var(--t3);background:rgba(0,232,255,.06);border:1px solid rgba(0,232,255,.1);
  max-width:120px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;
}
.to-unit.enemy-turn{border-color:rgba(155,48,255,.2);background:rgba(155,48,255,.06)}
.to-unit.active-turn{
  color:var(--c);border-color:rgba(0,232,255,.35);box-shadow:0 0 10px rgba(0,232,255,.12);
  background:rgba(0,232,255,.1);
}
.to-unit.enemy-turn.active-turn{color:var(--m);border-color:rgba(155,48,255,.35);box-shadow:0 0 10px rgba(155,48,255,.15)}
.to-sep{
  width:1px;height:14px;background:linear-gradient(180deg,transparent,rgba(0,232,255,.25),transparent);
  margin:0 4px;flex-shrink:0;
}

/*══════════════════════════════════════════════════════════════════
  ARENA VIEWPORT — Three.js canvas (squad-arena style HUD)
══════════════════════════════════════════════════════════════════*/
#arena{flex:1;position:relative;overflow:hidden;min-height:0}
#canvas-container{position:absolute;inset:0;z-index:1;overflow:hidden}
#three-container{position:absolute;inset:0;z-index:1;overflow:hidden;background:#000}
#three-canvas{width:100%;height:100%;display:block;touch-action:none}
#mw-floating-pops{position:absolute;inset:0;pointer-events:none;z-index:12;overflow:hidden}
.mw-dp{position:absolute;transform:translate(-50%,-50%);z-index:100;font-family:var(--FD);font-weight:900;letter-spacing:2px;pointer-events:none;white-space:nowrap}
.mw-dp.damage{color:var(--red);font-size:22px;text-shadow:0 0 10px rgba(255,34,68,.6),0 2px 4px #000;animation:fUp 1.15s ease-out forwards}
.mw-dp.crit{color:var(--gold);font-size:28px;text-shadow:0 0 14px rgba(255,200,32,.7),0 2px 4px #000;animation:fUpCrit 1.2s ease-out forwards}
.mw-dp.heal{color:var(--green);font-size:18px;text-shadow:0 0 8px rgba(0,255,136,.5);animation:fUp 1.15s ease-out forwards}
.mw-dp.miss{color:var(--t2);font-size:14px;font-family:var(--FM);letter-spacing:3px;animation:fUp 1.15s ease-out forwards}
.mw-dp.block{color:var(--c);font-size:14px;animation:fUp 1.15s ease-out forwards}
#mw-arena-hud{position:absolute;top:0;left:0;right:0;bottom:0;pointer-events:none;z-index:10}
#mw-round-banner{position:absolute;top:10px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,.72);border:1px solid rgba(0,240,255,.35);padding:4px 18px;font-family:var(--FM);font-size:9px;letter-spacing:3px;color:var(--c);display:none}
/* ── FLOATING HP BARS (projected over 3D models) ── */
#mw-hp-overlay{position:absolute;inset:0;pointer-events:none;z-index:13;overflow:hidden}
.mw-hp-float{position:absolute;transform:translate(-50%,0);display:flex;flex-direction:column;align-items:center;gap:1px;transition:left .1s,top .1s}
.mw-hp-float-name{font-family:var(--FD);font-size:8px;font-weight:700;letter-spacing:1.5px;color:rgba(220,240,255,.9);text-shadow:0 1px 4px rgba(0,0,0,.9),0 0 8px rgba(0,240,255,.2);white-space:nowrap}
.mw-hp-float-name.enemy{color:rgba(255,200,220,.9);text-shadow:0 1px 4px rgba(0,0,0,.9),0 0 8px rgba(212,0,255,.2)}
.mw-hp-float-track{width:90px;height:7px;background:rgba(0,0,0,.7);border:1px solid rgba(255,255,255,.12);border-radius:1px;overflow:hidden;position:relative}
.mw-hp-float-fill{height:100%;transition:width .4s cubic-bezier(.2,.8,.2,1);border-radius:0}
.mw-hp-float-fill.player{background:linear-gradient(90deg,#0088ff,#00ddff);box-shadow:inset 0 -1px 0 rgba(0,0,0,.3),0 0 6px rgba(0,200,255,.3)}
.mw-hp-float-fill.enemy{background:linear-gradient(90deg,#ff3344,#ff7744);box-shadow:inset 0 -1px 0 rgba(0,0,0,.3),0 0 6px rgba(255,60,80,.3)}
.mw-hp-float-fill.low{background:linear-gradient(90deg,#ff8800,#ffcc00)!important;box-shadow:inset 0 -1px 0 rgba(0,0,0,.3),0 0 8px rgba(255,150,0,.4)!important}
.mw-hp-float-fill.crit{background:linear-gradient(90deg,#ff0022,#ff3344)!important;animation:hpCritPulse .8s ease-in-out infinite!important}
@keyframes hpCritPulse{0%,100%{box-shadow:0 0 4px rgba(255,0,30,.4)}50%{box-shadow:0 0 12px rgba(255,0,30,.8)}}
.mw-hp-float-nums{font-family:var(--FM);font-size:7px;color:rgba(200,220,255,.65);letter-spacing:.5px;text-shadow:0 1px 3px rgba(0,0,0,.8)}

/* ── CORNER HP BARS (secondary, semi-transparent — floating bars are primary) ── */
.mw-hp-bar-group{position:absolute;display:flex;flex-direction:column;gap:5px;pointer-events:none;opacity:0.5}
#mw-player-bars{bottom:12px;left:10px}
#mw-enemy-bars{bottom:12px;right:10px;align-items:flex-end}
.mw-unit-hp-block{display:flex;flex-direction:column;gap:2px}
.mw-unit-hp-block.enemy{align-items:flex-end}
.mw-unit-name-tag{font-family:var(--FM);font-size:7px;letter-spacing:1.2px;color:rgba(200,220,255,.75)}
.mw-unit-name-tag.enemy{color:rgba(255,150,180,.75)}
.mw-hp-track{width:108px;height:5px;background:rgba(255,255,255,.08);border-radius:0;overflow:hidden;position:relative}
.mw-hp-fill{height:100%;transition:width .45s ease;position:relative}
.mw-hp-fill.player{background:linear-gradient(90deg,#0088ff,#00ddff)}
.mw-hp-fill.enemy{background:linear-gradient(90deg,#ff4444,#ff8800)}
.mw-hp-fill.enemy.low{background:linear-gradient(90deg,#ff8800,#ffcc00)}
.mw-hp-nums{font-family:var(--FM);font-size:7px;color:rgba(200,220,255,.45);letter-spacing:.5px}
.mw-hp-nums.enemy{text-align:right}
#mw-center-fx{position:absolute;top:46%;left:50%;transform:translate(-50%,-50%);pointer-events:none;text-align:center}
#mw-dmg-number{font-size:0;color:#ff4444;font-weight:700;letter-spacing:2px;transition:all .1s;text-shadow:0 0 10px rgba(255,68,68,.8);opacity:0;font-family:var(--FD)}
#mw-flash-overlay{position:absolute;top:0;left:0;right:0;bottom:0;background:#fff;opacity:0;pointer-events:none;z-index:20}
#mw-cinematic-bars-top{position:absolute;top:0;left:0;right:0;height:0;background:#000;transition:height .3s ease;z-index:15}
#mw-cinematic-bars-bot{position:absolute;bottom:0;left:0;right:0;height:0;background:#000;transition:height .3s ease;z-index:15}
#mw-ability-caption{position:absolute;bottom:44px;left:50%;transform:translateX(-50%);opacity:0;text-align:center;transition:opacity .3s;pointer-events:none}
#mw-ability-name{font-family:var(--FD);font-size:13px;letter-spacing:3px;color:#fff;font-weight:700}
#mw-ability-sub{font-family:var(--FM);font-size:8px;letter-spacing:2px;color:rgba(255,200,0,.85);margin-top:2px}

/* BG — decor layers sit behind #canvas-container (z-index 0) */
#abg{position:absolute;inset:0;z-index:0;pointer-events:none}
.abg-sky{
  position:absolute;inset:0;
  background:linear-gradient(180deg,
    #03060f 0%,#060d1e 20%,
    #0a1428 40%,#0d1235 58%,
    #100e2e 72%,#130826 88%,#160630 100%);
}
.abg-nebula{
  position:absolute;inset:0;pointer-events:none;
  background:
    radial-gradient(ellipse 55% 35% at 18% 42%,rgba(155,48,255,.065) 0%,transparent 62%),
    radial-gradient(ellipse 40% 28% at 82% 28%,rgba(0,232,255,.05) 0%,transparent 58%),
    radial-gradient(ellipse 32% 22% at 50% 62%,rgba(0,200,255,.03) 0%,transparent 52%);
}
.abg-stars{position:absolute;inset:0}.abg-hz{position:absolute;top:24%;left:0;right:0;height:26%;
  background:linear-gradient(180deg,rgba(160,90,40,.06),rgba(0,180,255,.025),transparent)}
.star{position:absolute;border-radius:50%;background:#fff;animation:tw var(--d,3s) ease-in-out infinite var(--dl,0s)}
@keyframes tw{0%,100%{opacity:.15}50%{opacity:var(--p,.65)}}

/* Floor */
#afl{position:absolute;bottom:0;left:50%;width:150%;transform:translateX(-50%);height:60%;perspective:520px;z-index:0;pointer-events:none}
#afp{width:100%;height:100%;transform:rotateX(55deg);transform-origin:bottom center;position:relative}
#afg{position:absolute;inset:0;
  background-image:
    linear-gradient(rgba(0,232,255,.052) 1px,transparent 1px),
    linear-gradient(90deg,rgba(0,232,255,.052) 1px,transparent 1px),
    linear-gradient(45deg,rgba(155,48,255,.018) 1px,transparent 1px);
  background-size:52px 52px,52px 52px,104px 104px;mask-image:radial-gradient(ellipse 62% 82% at 50% 55%,black 12%,transparent 72%)}
#afglow{position:absolute;inset:0;background:radial-gradient(ellipse 42% 50% at 50% 48%,rgba(0,240,255,.045),transparent 60%)}

/* Ring */
#aring{position:absolute;bottom:5%;left:50%;transform:translateX(-50%);width:80%;height:0;padding-bottom:30%;z-index:0;pointer-events:none}
#aring::before{
  content:'';position:absolute;inset:0;
  border:1px solid rgba(0,232,255,.12);border-radius:50%;
  box-shadow:0 0 30px rgba(0,232,255,.04),inset 0 0 30px rgba(0,232,255,.02);
  animation:rpl 4.5s ease-in-out infinite;
}
#aring::after{
  content:'';position:absolute;inset:12px;
  border:1px dashed rgba(155,48,255,.07);border-radius:50%;pointer-events:none;
}
@keyframes rpl{0%,100%{opacity:.35}50%{opacity:.8}}

/* Command frame */
#cfr{position:absolute;inset:0;z-index:10;pointer-events:none}
.fe{position:absolute;pointer-events:auto}
.fe.l{left:0;top:0;bottom:0;width:50px;background:linear-gradient(to right,rgba(3,16,28,.94),rgba(3,16,28,.4),transparent)}
.fe.r{right:0;top:0;bottom:0;width:50px;background:linear-gradient(to left,rgba(3,16,28,.94),rgba(3,16,28,.4),transparent)}
.fpn{position:absolute;width:36px;height:65px;background:rgba(3,16,28,.9);border:1px solid rgba(0,240,255,.09);
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:5px;border-radius:2px}
.fpn.tl{left:6px;top:40px}.fpn.bl{left:6px;bottom:40px}.fpn.tr{right:6px;top:40px}.fpn.br{right:6px;bottom:40px}
.fl{width:6px;height:6px;border-radius:1px;box-shadow:0 0 5px currentColor}
.fl.cy{background:var(--c);color:var(--c)}.fl.or{background:var(--orange);color:var(--orange)}
.fl.gn{background:var(--green);color:var(--green)}.fl.off{background:rgba(60,80,100,.1);color:transparent;box-shadow:none}
.fb{position:absolute;height:2px;background:linear-gradient(90deg,var(--c),var(--m),var(--c));border-radius:1px;
  box-shadow:0 0 6px rgba(0,240,255,.2);animation:fbp 3s ease-in-out infinite}
.fb.ftl{top:10px;left:52px;width:90px}.fb.ftr{top:10px;right:52px;width:90px}
@keyframes fbp{0%,100%{opacity:.3}50%{opacity:.8}}

/*══════════════════════════════════════════════════════════════════
  UNIT PLATFORMS
══════════════════════════════════════════════════════════════════*/
#units{position:absolute;inset:0;z-index:5}
.up{position:absolute;display:flex;flex-direction:column;align-items:center;transform:translate(-50%,-50%);
  transition:all .4s cubic-bezier(.2,.8,.2,1);cursor:pointer;z-index:5}
.up:hover{z-index:8}
.up.dead{opacity:.15;pointer-events:none;filter:grayscale(1) brightness(.4)}
.up.tgt .pb{box-shadow:0 0 26px rgba(255,34,68,.5);border-color:rgba(255,34,68,.5)}
.up.tgt .pb::after{background:rgba(255,34,68,.06)}
.up.act .uf{animation:abounce .5s ease}
@keyframes abounce{0%{transform:translateY(0) scale(1)}30%{transform:translateY(-14px) scale(1.1)}100%{transform:translateY(0) scale(1)}}
.up.sel .pb{border-color:var(--c);box-shadow:0 0 26px rgba(0,240,255,.35)}
/* Arena shake from arena.php */
.up.shaking{animation:shake .44s cubic-bezier(.36,.07,.19,.97)!important}
@keyframes shake{0%,100%{transform:translate(-50%,-50%) translateX(0)}15%{transform:translate(-50%,-50%) translateX(-7px)}30%{transform:translate(-50%,-50%) translateX(7px)}45%{transform:translate(-50%,-50%) translateX(-4px)}60%{transform:translate(-50%,-50%) translateX(4px)}75%{transform:translate(-50%,-50%) translateX(-2px)}}
/* Death from arena.php */
.up.dying{animation:holoDie 1.2s ease forwards!important}
@keyframes holoDie{0%{opacity:1;filter:brightness(1)}20%{filter:brightness(2.8) saturate(4) hue-rotate(30deg)}50%{opacity:.5;filter:brightness(.4) blur(2px) saturate(0)}100%{opacity:.08;filter:brightness(.1) blur(5px) saturate(0)}}

/* Hex platform */
.pb{width:110px;height:32px;position:relative;border:1px solid rgba(0,240,255,.2);
  background:linear-gradient(180deg,rgba(0,240,255,.06),rgba(0,240,255,.012));
  clip-path:polygon(12% 0%,88% 0%,100% 50%,88% 100%,12% 100%,0% 50%);
  box-shadow:0 0 16px rgba(0,240,255,.1);transition:all .3s}
.pb::before{content:'';position:absolute;inset:2px;clip-path:polygon(12% 0%,88% 0%,100% 50%,88% 100%,12% 100%,0% 50%);
  background:repeating-linear-gradient(90deg,rgba(0,240,255,.03) 0px,transparent 1px,transparent 7px)}
.pb::after{content:'';position:absolute;inset:0;clip-path:polygon(12% 0%,88% 0%,100% 50%,88% 100%,12% 100%,0% 50%);
  background:rgba(0,240,255,.025);animation:pg 3s ease-in-out infinite;transition:background .3s}
@keyframes pg{0%,100%{opacity:.4}50%{opacity:1}}
.pb.ep{border-color:rgba(212,0,255,.16);background:linear-gradient(180deg,rgba(212,0,255,.04),rgba(212,0,255,.008));box-shadow:0 0 12px rgba(212,0,255,.07)}
.pb.ep::before{background:repeating-linear-gradient(90deg,rgba(212,0,255,.02) 0px,transparent 1px,transparent 7px)}
.pb.ep::after{background:rgba(212,0,255,.02)}

.uf{position:relative;display:flex;flex-direction:column;align-items:center;margin-bottom:-2px;transition:transform .3s}
.up:hover .uf{transform:translateY(-5px)}
.uf-i{font-size:42px;filter:drop-shadow(0 0 14px rgba(0,240,255,.3));line-height:1;animation:ufl 4s ease-in-out infinite}
.uf-i .uf-img{width:48px;height:48px;object-fit:cover;border-radius:4px;border:1px solid rgba(0,240,255,.2);display:block}
.es .uf-i{filter:drop-shadow(0 0 14px rgba(212,0,255,.22))}
@keyframes ufl{0%,100%{transform:translateY(0)}50%{transform:translateY(-5px)}}
.hb{position:absolute;bottom:-1px;left:50%;transform:translateX(-50%);width:2px;height:26px;
  background:linear-gradient(0deg,rgba(0,240,255,.22),transparent);filter:blur(1px);pointer-events:none}
.es .hb{background:linear-gradient(0deg,rgba(212,0,255,.14),transparent)}

/* Unit HUD */
.uh{display:flex;flex-direction:column;align-items:center;gap:1px;margin-bottom:2px;min-width:100px}
.up .uh{
  padding:4px 8px 6px;border-radius:var(--r2);
  background:rgba(2,10,22,.55);border:1px solid rgba(0,232,255,.1);
  backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);
  box-shadow:0 4px 20px rgba(0,0,0,.35),inset 0 1px 0 rgba(255,255,255,.04);
}
.upos{font-family:var(--FD);font-size:6px;font-weight:700;letter-spacing:2px;padding:1px 5px;border:1px solid;margin-bottom:1px}
.upos.front{color:#ff6644;border-color:rgba(255,102,68,.28)}.upos.mid{color:var(--gold);border-color:rgba(255,200,32,.28)}
.upos.back{color:var(--c);border-color:rgba(0,240,255,.28)}
.unm{font-family:var(--FD);font-size:7.5px;font-weight:700;letter-spacing:1.5px;color:var(--t1);text-shadow:0 1px 3px rgba(0,0,0,.9);white-space:nowrap}
.ucl{font-family:var(--FM);font-size:6px;letter-spacing:.8px;color:var(--t3)}
.uhp{width:82px;display:flex;flex-direction:column;gap:1px}
.uhpb{height:5px;background:rgba(0,0,0,.5);border:1px solid rgba(0,240,255,.1);overflow:hidden}
.uhpf{height:100%;transition:width .6s cubic-bezier(.2,.8,.2,1)}
.uhpf.al{background:linear-gradient(90deg,#00cc55,#00ff99);box-shadow:0 0 6px rgba(0,255,136,.3)}
.uhpf.en{background:linear-gradient(90deg,#cc0022,#ff2244);box-shadow:0 0 6px rgba(255,30,60,.3)}
.uhpf.warn{background:linear-gradient(90deg,#ff6600,#ff9900)!important;box-shadow:0 0 6px rgba(255,120,0,.3)!important}
.uhpf.crit{background:linear-gradient(90deg,#cc0022,#ff2244)!important;animation:critF .9s ease-in-out infinite!important}
@keyframes critF{0%,100%{box-shadow:0 0 6px rgba(255,30,60,.3)}50%{box-shadow:0 0 16px rgba(255,30,60,.65)}}
.uhpt{font-family:var(--FM);font-size:6.5px;color:var(--t2);text-align:center;text-shadow:0 0 3px rgba(0,0,0,.8)}

/* Damage popups — dpop-style motion on .dp (2D HUD) */
.dp{
  position:absolute;top:-8px;left:50%;transform:translateX(-50%);z-index:100;
  font-family:var(--FD);font-weight:900;letter-spacing:.12em;pointer-events:none;white-space:nowrap;
}
.dp.damage,.dp.heal,.dp.miss,.dp.block{animation:dfuDp 1.4s cubic-bezier(.2,.8,.2,1) forwards}
.dp.crit{color:var(--gold);font-size:28px;text-shadow:0 0 18px rgba(255,214,0,.8),0 2px 6px #000;animation:fUpCrit 1.2s ease-out forwards}
.dp.damage{color:var(--red);font-size:20px;text-shadow:0 0 12px rgba(255,61,86,.7),0 2px 4px #000}
.dp.heal{color:var(--green);font-size:17px;text-shadow:0 0 10px rgba(0,255,136,.6)}
.dp.miss{color:var(--t3);font-size:12px;font-family:var(--FM);letter-spacing:.2em}
.dp.block{color:var(--c);font-size:14px}
@keyframes dfuDp{
  0%{opacity:1;transform:translateX(-50%) translateY(0) scale(.7)}
  25%{transform:translateX(-50%) translateY(-24px) scale(1.3)}
  100%{opacity:0;transform:translateX(-50%) translateY(-52px) scale(.8)}
}
@keyframes fUp{0%{opacity:1;transform:translateX(-50%) translateY(0) scale(1)}15%{transform:translateX(-50%) translateY(-14px) scale(1.15)}100%{opacity:0;transform:translateX(-50%) translateY(-70px) scale(.7)}}
@keyframes fUpCrit{0%{opacity:1;transform:translateX(-50%) translateY(0) scale(1) rotate(-3deg)}10%{transform:translateX(-50%) translateY(-10px) scale(1.35) rotate(2deg)}25%{transform:translateX(-50%) translateY(-22px) scale(1.45) rotate(-1deg)}100%{opacity:0;transform:translateX(-50%) translateY(-90px) scale(.6) rotate(0)}}

/* Screen flash from arena — base tint; fuertes vía mw-flash / VFX en JS */
#sf{position:fixed;inset:0;z-index:500;pointer-events:none;opacity:0;background:rgba(0,232,255,.07);transition:opacity .06s}
#sf.pop{opacity:1;transition:none}

/*══════════════════════════════════════════════════════════════════
  COMBAT LOG — right sidebar
══════════════════════════════════════════════════════════════════*/
#clog{position:absolute;top:8px;right:56px;width:200px;z-index:15;pointer-events:none;display:flex;flex-direction:column;gap:2px}
.cle{
  padding:4px 8px;font-family:var(--FM);font-size:7px;letter-spacing:.04em;color:var(--t2);line-height:1.4;
  background:rgba(2,8,18,.85);border:1px solid rgba(0,232,255,.07);border-left:2px solid var(--c);
  backdrop-filter:blur(8px);border-radius:0 3px 3px 0;animation:cli .2s ease both;
  display:flex;align-items:center;gap:5px;flex-wrap:wrap;
}
@keyframes cli{from{opacity:0;transform:translateX(10px)}to{opacity:1;transform:translateX(0)}}
.cle .trn{font-family:var(--FM);font-size:7px;color:var(--t4);margin-right:2px;flex-shrink:0}
.cle.pa{color:rgba(175,248,255,.92);border-left-color:var(--c)}.cle.pa .actor{color:var(--c)}
.cle.ea{color:rgba(238,210,255,.92);border-left-color:var(--m)}.cle.ea .actor{color:var(--m)}
.cle .dt{color:var(--red);font-weight:700}.cle .ht{color:var(--green);font-weight:700}
.cle .ct{color:var(--gold);font-family:var(--FD);font-size:9px}
.cle.sys{color:var(--t3);font-style:italic;border-left-color:rgba(155,48,255,.35)}
.cle.pa::before{content:'⚔ ';color:var(--c);font-size:9px;margin-right:2px;flex-shrink:0;line-height:1}
.cle.ea::before{content:'⬡ ';color:var(--m);font-size:9px;margin-right:2px;flex-shrink:0;line-height:1}
.cle.sys::before{content:'◈ ';color:var(--gold);font-size:9px;margin-right:2px;flex-shrink:0;line-height:1}

/*══════════════════════════════════════════════════════════════════
  BOTTOM — tools/cards .avatar-card (row-span 2) + 2×2 skill tiles
══════════════════════════════════════════════════════════════════*/
#ability-hud{--ahsq:min(118px,12vw);z-index:20;flex-shrink:0;border-top:1px solid rgba(0,232,255,.08);
  background:linear-gradient(0deg,rgba(1,6,14,.98) 0%,rgba(2,10,20,.93) 100%);
  backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);position:relative;
  display:flex;flex-direction:column;min-height:0}
#ability-hud::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;
  background:linear-gradient(90deg,transparent 2%,rgba(0,232,255,.5) 25%,rgba(155,48,255,.6) 50%,rgba(0,232,255,.5) 75%,transparent 98%);opacity:.85}

.hud-label{font-family:var(--FD);font-size:8px;letter-spacing:.28em;text-transform:uppercase;color:var(--t3);
  padding:6px 16px 0;display:flex;align-items:center;gap:8px;flex-shrink:0;box-sizing:border-box;overflow:hidden}
.hud-label::after{content:'';flex:1;height:1px;background:linear-gradient(90deg,rgba(0,232,255,.12),transparent)}

#apanel{z-index:1;flex:1;min-height:0;position:relative;
  background:linear-gradient(0deg,rgba(1,6,14,.98) 0%,rgba(2,10,20,.93) 100%);
  border-top:1px solid rgba(0,232,255,.08)}
#apanel::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;
  background:linear-gradient(90deg,transparent 2%,rgba(0,232,255,.5) 25%,rgba(155,48,255,.6) 50%,rgba(0,232,255,.5) 75%,transparent 98%);opacity:.85}
#ah-inner{padding:6px 12px 8px;min-height:0}
.ah-row-squad{display:flex;gap:8px;align-items:stretch}

/* Per-ally: grid [ avatar-card ×2 rows | 2×2 skill tiles ] — passive not shown as tile */
.pu-pack{flex:1;display:grid;grid-template-columns:minmax(100px,12.5vw) repeat(2,var(--ahsq));
  grid-template-rows:var(--ahsq) var(--ahsq);gap:8px;min-width:0;
  background:rgba(0,232,255,.03);border:1px solid rgba(0,232,255,.1);border-radius:var(--r);padding:6px 8px}
.pu-pack.unit-dead{opacity:.28;pointer-events:none;filter:grayscale(.75)}
.pu-pack>.avatar-card.ac-hud{grid-column:1;grid-row:1/span 2;align-self:stretch;min-height:0;margin:0}
.pu-pack>.skc:nth-child(2){grid-column:2;grid-row:1}
.pu-pack>.skc:nth-child(3){grid-column:3;grid-row:1}
.pu-pack>.skc:nth-child(4){grid-column:2;grid-row:2}
.pu-pack>.skc:nth-child(5){grid-column:3;grid-row:2}

/* ── tools/cards/index.html — avatar-card (compact HUD) ─────────── */
#apanel .avatar-card.ac-hud{position:relative;background:rgba(2,10,22,.92);border:1px solid rgba(0,232,255,.12);border-radius:var(--r);
  overflow:hidden;cursor:default;pointer-events:none;display:flex;flex-direction:column;
  min-height:calc(var(--ahsq) * 2 + 8px);justify-content:flex-start}
#apanel .avatar-card.ac-hud::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;
  background:var(--rarity-color,var(--c));opacity:.85;z-index:2}
#apanel .ac-hud .card-thumb{position:relative;flex:0 0 auto;height:56px;min-height:56px;max-height:56px;
  background:radial-gradient(ellipse at center,rgba(0,229,255,.06) 0%,transparent 70%);
  display:flex;align-items:center;justify-content:center;overflow:hidden;border-bottom:1px solid rgba(0,229,255,.08)}
#apanel .ac-hud .thumb-model{font-size:clamp(36px,8vw,52px);line-height:1;animation:acFloat 3.5s ease-in-out infinite;
  filter:drop-shadow(0 0 12px rgba(0,240,255,.25))}
#apanel .ac-hud .thumb-model.ac-hud-thumb-img{font-size:0;animation:none;filter:none;width:100%;height:100%;max-height:68px;display:flex;align-items:center;justify-content:center}
#apanel .ac-hud .thumb-model.ac-hud-thumb-img img{width:100%;height:100%;max-height:56px;object-fit:contain}
@keyframes acFloat{0%,100%{transform:translateY(0)}50%{transform:translateY(-4px)}}
#apanel .ac-hud .thumb-ring{position:absolute;bottom:4px;left:50%;transform:translateX(-50%);width:52px;height:7px;border-radius:50%;
  border:1px solid rgba(0,229,255,.35);box-shadow:0 0 8px rgba(0,229,255,.15);opacity:.6}
#apanel .ac-hud .card-rarity-badge{position:absolute;top:4px;right:4px;font-family:var(--FD);font-size:6px;font-weight:700;
  letter-spacing:1px;text-transform:uppercase;padding:2px 5px;border-radius:2px;border:1px solid var(--rarity-color,var(--c));
  color:var(--rarity-color,var(--c));background:rgba(0,0,0,.55);z-index:4}
#apanel .ac-hud .card-id{position:absolute;top:4px;left:4px;font-family:var(--FD);font-size:6px;letter-spacing:.5px;color:var(--t3);z-index:4}
#apanel .ac-hud .card-body{padding:5px 7px 6px;display:flex;flex-direction:column;gap:5px;flex:1 1 auto;min-height:0;overflow:visible}
#apanel .ac-hud .card-name{font-family:var(--FD);font-size:8.5px;font-weight:700;letter-spacing:1px;text-transform:uppercase;
  color:var(--t1);line-height:1.1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
#apanel .ac-hud .card-tagline{font-family:var(--FM);font-size:6px;letter-spacing:.3px;color:var(--t3);margin-top:-2px}
#apanel .ac-hud .card-stats{display:grid;grid-template-columns:1fr 1fr;gap:3px 5px}
#apanel .ac-hud .stat-item{display:flex;flex-direction:column;gap:1px}
#apanel .ac-hud .stat-header{display:flex;justify-content:space-between;align-items:center}
#apanel .ac-hud .stat-label{font-family:var(--FD);font-size:5px;letter-spacing:1px;text-transform:uppercase;color:var(--t4)}
#apanel .ac-hud .stat-value{font-family:var(--FD);font-size:7px;font-weight:600;color:var(--t2)}
#apanel .ac-hud .stat-bar{height:2px;background:rgba(0,229,255,.1);border-radius:1px;overflow:hidden}
#apanel .ac-hud .stat-fill{height:100%;border-radius:1px;box-shadow:0 0 3px var(--stat-color,var(--c));transition:width .6s ease}
#apanel .ac-hud .card-footer{display:flex;align-items:center;justify-content:space-between;padding-top:4px;margin-top:1px;
  border-top:1px solid rgba(0,229,255,.08);font-family:var(--FM);font-size:6px;color:var(--t3)}
#apanel .ac-hud .card-class{text-transform:uppercase;letter-spacing:.5px}
#apanel .ac-hud .card-hp-bar{flex:1;max-width:48px;height:3px;background:rgba(0,0,0,.4);border:1px solid rgba(0,240,255,.12);
  border-radius:1px;overflow:hidden;margin:0 4px}
#apanel .ac-hud .card-hp-f{height:100%;background:linear-gradient(90deg,#20e080,var(--c));transition:width .6s ease}
#apanel .ac-hud .card-effects{display:flex;align-items:center;flex-wrap:wrap;gap:3px;min-height:10px;margin-top:-1px}
#apanel .ac-hud .fx-chip{display:inline-flex;align-items:center;gap:2px;padding:1px 3px;border-radius:2px;
  border:1px solid rgba(0,232,255,.18);background:rgba(0,20,40,.72);font-family:var(--FD);font-size:6px;letter-spacing:.2px;color:var(--t2)}
#apanel .ac-hud .fx-chip .fx-i{font-size:7px;line-height:1}
#apanel .ac-hud .fx-chip .fx-d{font-size:6px;color:var(--t3)}

/* Square skill tiles */
#apanel .pu-pack>.skc{width:var(--ahsq);height:var(--ahsq);max-width:100%;max-height:100%;justify-self:center;align-self:center;
  background:rgba(0,12,28,.75);border:1px solid rgba(0,232,255,.09);border-radius:var(--r);padding:6px 7px;cursor:pointer;
  transition:all .2s;position:relative;overflow:hidden;display:flex;flex-direction:column;gap:2px;box-sizing:border-box;
  clip-path:polygon(5px 0%,100% 0%,100% calc(100% - 5px),calc(100% - 5px) 100%,0 100%,0 5px)}
#apanel .pu-pack>.skc::before{content:'';position:absolute;left:0;top:0;bottom:0;width:2px;background:var(--skc,var(--c));opacity:.45;transition:opacity .2s;border-radius:2px 0 0 2px;z-index:1}
#apanel .pu-pack>.skc::after{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:var(--skc,var(--c));opacity:0;transition:opacity .2s;z-index:1}
#apanel .pu-pack>.skc:hover:not(.cdx):not(.skdis):not(.skph){border-color:rgba(0,232,255,.28);background:rgba(0,22,50,.75);transform:translateY(-3px);
  box-shadow:0 6px 18px rgba(0,0,0,.3),0 0 12px rgba(0,232,255,.06)}
#apanel .pu-pack>.skc:hover:not(.cdx):not(.skdis):not(.skph)::before{opacity:1}
#apanel .pu-pack>.skc:hover:not(.cdx):not(.skdis):not(.skph)::after{opacity:.6}
#apanel .pu-pack>.skc.sl{border-color:var(--skc,var(--c));background:rgba(0,28,60,.65);box-shadow:0 0 20px rgba(0,232,255,.1),inset 0 0 20px rgba(0,232,255,.03)}
#apanel .pu-pack>.skc.sl::before{opacity:1}
#apanel .pu-pack>.skc.sl::after{opacity:1}
#apanel .pu-pack>.skc.cdx,#apanel .pu-pack>.skc.skdis{opacity:.38;pointer-events:none;cursor:not-allowed}
#apanel .pu-pack>.skc.skph{visibility:hidden;pointer-events:none;opacity:0!important;border-color:transparent!important;
  background:transparent!important;box-shadow:none!important}
#apanel .pu-pack>.skc.skph::before,#apanel .pu-pack>.skc.skph::after{display:none}
.skt{
  font-family:var(--FD);font-size:5px;letter-spacing:.18em;color:var(--skc,var(--t3));text-transform:uppercase;
  display:inline-flex;align-items:center;gap:3px;
}
.skt::before{content:'';width:4px;height:4px;border-radius:50%;background:var(--skc,var(--t3));box-shadow:0 0 4px var(--skc,transparent);flex-shrink:0}
.skn{font-family:var(--FB);font-size:11px;font-weight:700;color:var(--t1);line-height:1.08}
.skd{font-family:var(--FM);font-size:6px;color:var(--t3);line-height:1.25;flex:1;min-height:0;overflow:hidden;
  display:-webkit-box;-webkit-line-clamp:4;-webkit-box-orient:vertical}
.skm{display:flex;justify-content:space-between;align-items:center;gap:4px;font-family:var(--FM);font-size:6.5px;margin-top:auto;flex-shrink:0}
.skcs{color:var(--gold);letter-spacing:.35px;white-space:nowrap}
.skcv{color:var(--t3);letter-spacing:.35px;white-space:nowrap}.skcv.on{color:var(--red)}

/* ── CONFIRM PANEL ── */
#confirm{display:flex;align-items:center;gap:12px;padding:5px 16px 8px;border-top:1px solid rgba(0,240,255,.06);flex-shrink:0}
#confirm-label{font-family:var(--FD);font-size:8px;letter-spacing:3px;color:var(--t3);flex-shrink:0}
#confirm-slots{display:flex;gap:6px;flex:1}
.cslot{flex:1;max-width:160px;height:32px;border:1px dashed rgba(0,240,255,.12);border-radius:2px;
  display:flex;align-items:center;gap:6px;padding:0 8px;transition:all .2s;overflow:hidden}
.cslot.filled{border-style:solid;border-color:var(--sc,var(--c));background:rgba(0,0,0,.35);
  box-shadow:0 0 8px var(--sg,rgba(0,240,255,.06))}
.cslot-i{font-size:12px}.cslot-n{font-family:var(--FD);font-size:7px;letter-spacing:1px;color:var(--t2);
  overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.cslot-e{font-family:var(--FD);font-size:7px;letter-spacing:2px;color:var(--t4)}

#send-btn{padding:8px 22px;background:transparent;border:1px solid rgba(0,240,255,.2);color:rgba(0,240,255,.3);
  font-family:var(--FD);font-size:10px;font-weight:900;letter-spacing:4px;cursor:not-allowed;transition:all .25s;
  position:relative;overflow:hidden;flex-shrink:0;
  clip-path:polygon(6px 0%,100% 0%,100% calc(100% - 6px),calc(100% - 6px) 100%,0 100%,0 6px)}
#send-btn.rdy{border-color:var(--c);color:var(--c);cursor:pointer;box-shadow:0 0 16px rgba(0,240,255,.1)}
#send-btn.rdy::before{content:'';position:absolute;inset:0;background:linear-gradient(90deg,transparent,rgba(0,240,255,.05),transparent);animation:sw 2.5s ease infinite}
@keyframes sw{0%{transform:translateX(-100%)}100%{transform:translateX(100%)}}
#send-btn.rdy:hover{box-shadow:0 0 26px rgba(0,240,255,.2);background:rgba(0,30,55,.8);letter-spacing:6px}

/*══════════════════════════════════════════════════════════════════
  OVERLAYS
══════════════════════════════════════════════════════════════════*/
#phov{
  position:fixed;inset:0;z-index:100;display:flex;align-items:center;justify-content:center;
  background:rgba(1,5,8,.75);backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px);
  opacity:0;pointer-events:none;transition:opacity .3s;
}
#phov.show{opacity:1;pointer-events:none}
#phtx{
  font-family:var(--FD);font-size:clamp(18px,5vw,30px);font-weight:900;letter-spacing:.35em;color:var(--c);
  text-shadow:0 0 40px rgba(0,232,255,.6);animation:phz .95s cubic-bezier(.2,.8,.2,1) both;text-align:center;padding:0 12px;
}
@keyframes phz{0%{transform:scale(1.7) translateY(-10px);opacity:0}50%{opacity:1}100%{transform:scale(.92);opacity:0}}

/* ══ EPIC ENDGAME RESULT SCREEN ══ */
#eg{position:fixed;inset:0;z-index:600;display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity .5s}
#eg.show{opacity:1;pointer-events:all}
#eg-bg{position:absolute;inset:0;backdrop-filter:blur(22px) saturate(1.5) brightness(0.7);transition:background .6s}
#eg.win #eg-bg{background:radial-gradient(ellipse at 50% 40%,rgba(0,40,60,.85),rgba(0,5,12,.95))}
#eg.lose #eg-bg{background:radial-gradient(ellipse at 50% 40%,rgba(40,0,20,.85),rgba(8,0,5,.95))}
#eg-confetti{position:absolute;inset:0;pointer-events:none;overflow:hidden;z-index:1}
.confetti-p{position:absolute;width:6px;height:10px;opacity:0;animation:confettiFall var(--dur,3s) ease-in var(--delay,0s) forwards}
@keyframes confettiFall{0%{opacity:1;transform:translateY(-20px) rotate(0deg) scale(1)}50%{opacity:1}100%{opacity:0;transform:translateY(100vh) rotate(var(--rot,720deg)) scale(0.3)}}
#eg-p{position:relative;z-index:2;width:min(94vw,580px);display:flex;flex-direction:column;align-items:center;text-align:center;gap:0}

/* Top accent line */
.eg-tl{width:100%;height:3px;background:var(--egc,var(--c));box-shadow:0 0 30px var(--egc,var(--c)),0 0 60px var(--egc,var(--c));transform:scaleX(0);animation:egLine .7s cubic-bezier(.2,.8,.2,1) forwards}
@keyframes egLine{to{transform:scaleX(1)}}

/* Main card — rmod-style frame + hex texture (children stay above ::after) */
.eg-box{
  position:relative;width:100%;overflow:hidden;
  background:linear-gradient(180deg,rgba(2,10,22,.96),rgba(3,10,18,.98));
  border:1px solid rgba(0,232,255,.12);border-top:none;border-bottom:none;
  padding:36px 40px 32px;display:flex;flex-direction:column;align-items:center;gap:0;
  clip-path:polygon(0 0,100% 0,100% calc(100% - 16px),calc(100% - 16px) 100%,16px 100%,0 calc(100% - 16px));
}
.eg-box::after{
  content:'';position:absolute;inset:0;pointer-events:none;z-index:0;
  background-image:radial-gradient(rgba(0,232,255,.025) 1px,transparent 1px);
  background-size:20px 20px;
}
.eg-box>*{position:relative;z-index:1}

/* Icon */
.eg-icon{font-size:64px;line-height:1;opacity:0;transform:scale(0.2) rotate(-20deg);filter:drop-shadow(0 0 24px var(--egc,var(--c)))}
.eg-icon.anim{animation:egIconPop .6s cubic-bezier(.15,1.2,.3,1) forwards}
@keyframes egIconPop{to{opacity:1;transform:scale(1) rotate(0deg)}}

/* Title: VICTORY / DEFEAT */
.eg-res{font-family:var(--FD);font-weight:900;letter-spacing:8px;line-height:1;color:var(--egc,var(--c));margin-top:10px;
  text-shadow:0 0 30px var(--egc,var(--c)),0 0 80px var(--egc,var(--c));font-size:clamp(42px,8vw,76px);
  opacity:0;transform:translateY(24px) scaleX(0.7)}
.eg-res.anim{animation:egTitleSlam .5s cubic-bezier(.15,1,.3,1) forwards}
@keyframes egTitleSlam{to{opacity:1;transform:translateY(0) scaleX(1)}}

/* Subtitle */
.eg-sub{font-family:var(--FM);font-size:11px;letter-spacing:3px;color:var(--t2);margin-top:8px;opacity:0;transform:translateY(8px)}
.eg-sub.anim{animation:egFade .4s ease forwards}
@keyframes egFade{to{opacity:1;transform:translateY(0)}}

/* Divider */
.eg-div{width:80%;height:1px;background:linear-gradient(90deg,transparent,rgba(255,255,255,.1),transparent);margin:18px 0;opacity:0}
.eg-div.anim{animation:egFade .3s ease forwards}

/* Stats row */
.eg-sr{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;width:100%;margin-top:4px}
.eg-si{text-align:center;opacity:0;transform:translateY(12px)}
.eg-si.anim{animation:egStatPop .5s cubic-bezier(.2,1,.3,1) forwards}
@keyframes egStatPop{to{opacity:1;transform:translateY(0)}}
.eg-sv{font-family:var(--FD);font-size:26px;font-weight:700;color:var(--egc,var(--c));text-shadow:0 0 14px var(--egc,var(--c))}
.eg-sl{font-family:var(--FM);font-size:7px;letter-spacing:2.5px;color:var(--t3);text-transform:uppercase;margin-top:2px}

/* XP Bar */
.eg-xp-wrap{width:85%;margin-top:16px;opacity:0;transform:translateY(8px)}
.eg-xp-wrap.anim{animation:egFade .4s ease forwards}
.eg-xp-label{display:flex;justify-content:space-between;font-family:var(--FM);font-size:8px;letter-spacing:2px;color:var(--t3);margin-bottom:4px}
.eg-xp-track{width:100%;height:10px;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.08);border-radius:1px;overflow:hidden;position:relative}
.eg-xp-fill{height:100%;width:0%;background:linear-gradient(90deg,var(--c),#00ffaa);box-shadow:0 0 10px var(--c);border-radius:1px;transition:width 1.5s cubic-bezier(.2,.8,.2,1)}
.eg-xp-fill.lose{background:linear-gradient(90deg,var(--m),#ff6688)}

/* Rewards row */
.eg-rw{display:flex;gap:18px;margin-top:16px;flex-wrap:wrap;justify-content:center}
.eg-ri{display:flex;align-items:center;gap:5px;font-family:var(--FM);font-size:13px;opacity:0;transform:scale(0.5) translateY(10px)}
.eg-ri.anim{animation:egRewardPop .5s cubic-bezier(.15,1.2,.3,1) forwards}
@keyframes egRewardPop{to{opacity:1;transform:scale(1) translateY(0)}}
.eg-rv{font-weight:700;font-family:var(--FD);font-size:15px}.eg-rv.xp{color:var(--c)}.eg-rv.rk{color:var(--gold)}.eg-rv.ke{color:var(--green)}
.eg-ri-icon{font-size:18px;filter:drop-shadow(0 0 6px currentColor)}
.eg-ri-icon:empty{display:none}

/* Quote */
.eg-q{font-family:var(--FB);font-size:14px;font-style:italic;color:var(--t2);line-height:1.6;max-width:380px;margin-top:18px;min-height:22px;opacity:0}
.eg-q.anim{animation:egFade .3s ease forwards}

/* Buttons */
.eg-btns{display:flex;gap:12px;margin-top:20px;opacity:0;transform:translateY(10px)}
.eg-btns.anim{animation:egFade .4s ease forwards}
.eg-btn{background:transparent;border:1px solid var(--egc,var(--c));color:var(--egc,var(--c));font-family:var(--FD);
  font-size:10px;font-weight:700;letter-spacing:3px;padding:12px 28px;cursor:pointer;text-transform:uppercase;
  transition:all .25s;position:relative;overflow:hidden;
  clip-path:polygon(6px 0%,100% 0%,100% calc(100% - 6px),calc(100% - 6px) 100%,0 100%,0 6px)}
.eg-btn::before{content:'';position:absolute;inset:0;background:var(--egc,var(--c));opacity:0;transition:opacity .22s}
.eg-btn:hover::before{opacity:.12}
.eg-btn:hover{box-shadow:0 0 28px var(--egc,var(--c));letter-spacing:4px}
.eg-btn.sec{border-color:rgba(255,255,255,.12);color:var(--t2)}.eg-btn.sec:hover{border-color:var(--t2);box-shadow:0 0 12px rgba(255,255,255,.1)}

/* Bottom accent */
.eg-bl{width:100%;height:3px;background:var(--egc,var(--c));box-shadow:0 0 30px var(--egc,var(--c)),0 0 60px var(--egc,var(--c));transform:scaleX(0)}
.eg-bl.anim{animation:egLine .7s cubic-bezier(.2,.8,.2,1) forwards}

/* Enemy-turn badge — no blur/dim on canvas so Three.js combat stays visible */
#wov{position:absolute;top:10px;left:50%;transform:translateX(-50%);z-index:30;display:flex;flex-direction:column;
  align-items:center;justify-content:flex-start;gap:6px;padding:8px 14px;background:rgba(2,8,18,.88);

.wsp{width:42px;height:42px;margin:0 auto 8px;position:relative}
.wr{position:absolute;inset:0;border-radius:50%;border:2px solid transparent;border-top-color:var(--red);animation:ws 1s linear infinite}
.wr2{inset:5px;border-width:1.5px;border-right-color:rgba(255,61,86,.4);animation-direction:reverse;animation-duration:1.6s}
@keyframes ws{to{transform:rotate(360deg)}}
#wtx{font-family:var(--FD);font-size:9px;letter-spacing:.25em;color:var(--red);text-align:center}

/*══════════════════════════════════════════════════════════════════
  MIND WARS — UNIFIED BATTLEFIELD ENGINE V3
  • Isometric arena + tools/cards avatar-card + 2×2 skill tiles + PHP formulas
══════════════════════════════════════════════════════════════════*/
const RC={legendary:'#ffc030',epic:'#c040ff',rare:'#1a6aee',special:'#1aaa6a',common:'#4a7a8a'};
/** Timeline ms por fase (SquadWars server playback); ajustar ritmo global aquí. */
window.MW_SW_TIMELINE={
  dmg:{pre:130,post:210},
  dmgCrit:{pre:175,post:275},
  heal:{pre:90,post:120},
  death:{pre:80,post:320}
};
const AT={
  passive:{c:'#4a9aff',g:'rgba(74,154,255,.15)',i:'⬡',l:'PASSIVE'},
  ability:{c:'#00f0ff',g:'rgba(0,240,255,.15)',i:'◈',l:'ABILITY'},
  special:{c:'#d400ff',g:'rgba(212,0,255,.15)',i:'✦',l:'SPECIAL'},
  heal:{c:'#20e080',g:'rgba(32,224,128,.15)',i:'✚',l:'HEAL'},
  attack:{c:'#ff4060',g:'rgba(255,64,96,.15)',i:'⚡',l:'ATTACK'},
  defense:{c:'#40c0ff',g:'rgba(64,192,255,.15)',i:'⬟',l:'DEFENSE'}
};
const SKILL_TONE={
  heal:AT.heal,
  support:{c:'#40d4a0',g:'rgba(64,212,160,.15)',i:'◇',l:'SUPPORT'},
  control:{c:'#c94dff',g:'rgba(201,77,255,.15)',i:'⌁',l:'CONTROL'},
  hybrid:{c:'#ff9933',g:'rgba(255,153,51,.15)',i:'⎔',l:'HYBRID'},
  buff:{c:'#5cb3ff',g:'rgba(92,179,255,.15)',i:'⬟',l:'BUFF'}
};
function gt(t){return AT[(t||'ability').toLowerCase()]||AT.ability}
/** Color / label for ability & special from server `cardTone`, else slot type. */
function gtSkill(ab){
  if(!ab)return AT.ability;
  const ct=String(ab.cardTone||'').toLowerCase();
  if(ct==='heal')return AT.heal;
  if(ct==='support')return SKILL_TONE.support;
  if(ct==='control')return SKILL_TONE.control;
  if(ct==='hybrid')return SKILL_TONE.hybrid;
  if(ct==='defense')return SKILL_TONE.buff;
  if(ct==='damage'){
    const ty=String(ab.type||'ability').toLowerCase();
    return ty==='special'?AT.special:AT.ability;
  }
  return gt(ab.type);
}

/* ── PHP-MATCHING CONSTANTS ── */

function safeAttrUrl(s){
  const t=String(s==null?'':s).trim();
  if(!t||/^javascript:/i.test(t))return'';
  return t.replace(/"/g,'');
}
function normalizeUnitForBattle(u,isEnemySlot){
  const o={...u,isEnemy:u.isEnemy!=null?!!u.isEnemy:!!isEnemySlot};
  if(o.image==null)o.image='';
  if(o.modelGlb==null)o.modelGlb='';
  if(o.icon==null)o.icon='◆';
  if(o.level==null)o.level=1;
  ['mind','focus','speed','luck'].forEach(k=>{if(o[k]!=null)o[k]=Math.round(Number(o[k])||0)});
  return o;
}

/* ── PHP-MATCHING DAMAGE CALC ── */
function calcDmg(atk,def,mult=1.0,ignoreDef=false){
  const base=(atk.mind*2)+4+Math.floor(Math.random()*5);
  const red=ignoreDef?0:def.focus*MW.FOCUS_RED;
  /* Apply synergy damage bonus */
  var synergyMult = window.MWArenaStatus ? MWArenaStatus.getSynergyDmgMultiplier(atk) : 1;
  let dmg=Math.max(1,Math.round((base-red)*mult*synergyMult));
  /* Apply synergy crit bonus */
  var synergyCrit = window.MWArenaStatus ? MWArenaStatus.getSynergyCritBonus(atk) : 0;
  const critCh=Math.min((atk.luck*2)/100+synergyCrit,MW.CRIT_CAP);
  const crit=Math.random()<=critCh;
  if(crit)dmg=Math.round(dmg*MW.CRIT_MULT);
  const evCh=Math.min((def.speed*MW.EVADE_RATIO)/100,MW.EVADE_CAP);
  const evaded=Math.random()<=evCh;
  if(evaded)dmg=0;
  if(def.defending)dmg=Math.round(dmg*MW.DEFEND_MULT);
  if(def.passiveData?.dmgReduction&&dmg>0)dmg=Math.round(dmg*(1-def.passiveData.dmgReduction));
  /* Apply synergy team damage reduction */
  var synergyDR = window.MWArenaStatus ? MWArenaStatus.getSynergyDmgReduction(def) : 0;
  if(synergyDR>0&&dmg>0)dmg=Math.round(dmg*(1-synergyDR));
  return{damage:Math.max(0,dmg),crit,evaded};
}
function calcHp(lvl){return MW.HP_BASE+(Math.max(1,lvl)*MW.HP_PER_LVL)}
/** PHP bootstrap may send maxHp (mw_calc_hp + Tank hp_flat_bonus); else derive from level. */
function resolveUnitHp(x){
  const m=x&&x.maxHp;
  if(m!=null&&Number.isFinite(Number(m)))return Math.max(1,Math.round(Number(m)));
  return calcHp(x.level);
}

/** Sincroniza HP/energía desde state.units (p1–p3 / e1–e3) tras submit_round. */
function applyServerUnitsToG(st){
  if(!st||typeof st!=='object')return;
  const units=st.units||{};
  const pairs=[['p1',G.allies,0],['p2',G.allies,1],['p3',G.allies,2],['e1',G.enemies,0],['e2',G.enemies,1],['e3',G.enemies,2]];
  pairs.forEach(function(P){
    const su=units[P[0]];const arr=P[1];const idx=P[2];
    if(!arr||idx>=arr.length)return;
    const gu=arr[idx];
    if(!su||typeof su!=='object'||!gu)return;
    gu.hp=Math.max(0,Math.round(Number(su.hp)||0));
    gu.maxHp=Math.max(gu.hp,Math.round(Number(su.hp_max)||gu.maxHp||1));
    gu.energy=Math.max(0,Math.min(MW.MAX_ENERGY,Math.round(Number(su.energy)||0)));
    const cds=su.cooldowns;
    if(cds&&typeof cds==='object'&&gu.abilities){
      gu.abilities.forEach(function(s){
        if(!s||s.passive)return;
        const k=String(s.mwCode||s.skillId||'');
        if(k&&Object.prototype.hasOwnProperty.call(cds,k)){
          s.cd=Math.max(0,parseInt(String(cds[k]),10)||0);
        }
      });
    }
    gu.effects=Array.isArray(su.effects)?su.effects.map(function(fx){
      if(!fx||typeof fx!=='object')return null;
      return {
        type:String(fx.type||''),
        duration:fx.duration!=null?(parseInt(String(fx.duration),10)||0):null
      };
    }).filter(Boolean):[];
  });
  const tl=st.timeline;
  if(Array.isArray(tl)&&tl.length){
    G.swLastTimeline=tl.map(function(x){return String(x);});
  }
  renderUnits();
}

async function squadwarsBootstrapVm(){
  window.__SQUADWARS_VM={round:1,version:1};
  const api=window.KND_SQUADWARS_API;
  if(!api||!api.getBattleStateUrl)return;
  try{
    const r=await fetch(api.getBattleStateUrl,{credentials:'same-origin'});
    const j=await r.json();
    if(j&&j.ok&&j.data){
      const d=j.data;
      window.__SQUADWARS_VM={round:Number(d.round)||1,version:Number(d.stateVersion)||1};
      if(d.state)applyServerUnitsToG(d.state);
    }
  }catch(e){console.warn('[SquadWars] bootstrap state',e);}
}

function init(){
  const boot=window.__MW_BATTLE_INIT__;
  const srcA=(boot&&Array.isArray(boot.allies)&&boot.allies.length)?boot.allies:DEMO_AS;
  const srcE=(boot&&Array.isArray(boot.enemies)&&boot.enemies.length)?boot.enemies:DEMO_ES;
  G.allies=srcA.map(u=>{
    const x=normalizeUnitForBattle(u,false);
    const hp=resolveUnitHp(x);
    return{...x,abilities:x.abilities.map(a=>({...a})),hp,maxHp:hp,energy:MW.E_START,defending:false,
      passiveData:x.abilities.find(a=>a.passive)||{}};
  });
  G.enemies=srcE.map(u=>{
    const x=normalizeUnitForBattle(u,true);
    const hp=resolveUnitHp(x);
    return{...x,abilities:x.abilities.map(a=>({...a})),hp,maxHp:hp,energy:MW.E_START,defending:false,
      passiveData:x.abilities.find(a=>a.passive)||{}};
  });
  G.actions={};
  G.pendingPickEnemy=null;

  /* SquadWars: fila en BD + submit_round autoritativo por ronda (enemigos IA = default motor: ataque front). */
  if(boot&&boot.squadwars&&boot.squadwars.enabled&&boot.squadwars.battleToken){
    const tok=encodeURIComponent(boot.squadwars.battleToken);
    window.KND_SQUADWARS_API={
      battleToken:boot.squadwars.battleToken,
      getBattleStateUrl:(boot.squadwars.getBattleStateUrl||'')+'?battle_token='+tok,
      submitRoundUrl:boot.squadwars.submitRoundUrl||'',
      csrfToken:String(boot.csrfToken||'')
    };
    squadwarsBootstrapVm().then(beginBattleIntro,beginBattleIntro);
  }else{
    window.KND_SQUADWARS_API=null;
    beginBattleIntro();
  }
}

      s.textContent=(u.class||'')+' · LV '+(u.level||1)+' · '+(u.rarity||'common').toUpperCase();
      leftBox.appendChild(d);leftBox.appendChild(s);
    });
    if(rightBox) G.enemies.forEach(function(u){
      var d=document.createElement('div');
      d.style.cssText='font-family:var(--FD);font-size:13px;font-weight:700;letter-spacing:3px;color:var(--t1);text-shadow:0 0 10px rgba(212,0,255,.3);';
      d.textContent=(u.name||'ENEMY').toUpperCase();
      var s=document.createElement('div');
      s.style.cssText='font-family:var(--FM);font-size:9px;letter-spacing:2px;color:var(--t3);';
      s.textContent=(u.class||'')+' · LV '+(u.level||1)+' · '+(u.rarity||'common').toUpperCase();
      rightBox.appendChild(d);rightBox.appendChild(s);
    });
    // Animate in
    requestAnimationFrame(function(){
      var left=document.getElementById('vs-left');
      var right=document.getElementById('vs-right');
      var badge=document.getElementById('vs-badge');
      if(left){left.style.transform='translateX(0)';left.style.opacity='1';}
      if(right){right.style.transform='translateX(0)';right.style.opacity='1';}
      if(badge) badge.style.transform='scale(1)';
    });
    // Hold, then fade out
    setTimeout(function(){
      vsEl.style.opacity='0';
      setTimeout(function(){
        vsEl.style.display='none';
        resolve();
      },600);
    },2200);
  });
}

function buildPassiveBar(){
  var bar=document.getElementById('passive-bar');
  if(!bar) return;
  bar.innerHTML='';
  function addFrom(arr){
    (arr||[]).forEach(function(u){
      if(!u||u.hp<=0) return;
      var p=(u.abilities||[]).find(function(a){return a&&a.passive;});
      if(!p) return;
      var d=document.createElement('div');
      d.className='pab';
      var dot=document.createElement('span');
      dot.className='pab-dot';
      dot.style.background='var(--t-passive)';
      dot.style.boxShadow='0 0 6px var(--t-passive)';
      var nm=document.createElement('span');
      nm.className='pab-name';
      nm.textContent=((u.name||'Unit')+'').toUpperCase()+': ';
      var ds=document.createElement('span');
      ds.className='pab-desc';
      var line=(p.name||'Passive')+((p.desc&&String(p.desc).trim())?' — '+String(p.desc):'');
      if(line.length>52) line=line.slice(0,50)+'…';
      ds.textContent=line;
      d.appendChild(dot); d.appendChild(nm); d.appendChild(ds);
      bar.appendChild(d);
    });
  }
  addFrom(G.allies);
  addFrom(G.enemies);
}
function renderTurnOrder(){
  var host=document.getElementById('to-units');
  if(!host) return;
  host.innerHTML='';
  var enemyTurn=G.turn==='enemy';
  var playbackId=G.phase==='anim'&&G.swPlaybackActiveId?String(G.swPlaybackActiveId):'';
  /* SquadWars servidor: misma fila que el motor (speed + tirada), no bloque aliados|enemigos. */
  if(window.KND_SQUADWARS_API&&G.swLastTimeline&&G.swLastTimeline.length){
    G.swLastTimeline.forEach(function(sid){
      var u=swUnitByServerId(sid);
      if(!u||u.hp<=0)return;
      var div=document.createElement('div');
      div.className='to-unit'+(u.isEnemy?' enemy-turn':'');
      if(playbackId&&sid===playbackId)div.classList.add('active-turn');
      else if(!playbackId&&((u.isEnemy&&enemyTurn)||(!u.isEnemy&&!enemyTurn)))div.classList.add('active-turn');
      div.textContent=((u.name||'?')+'').toUpperCase();
      host.appendChild(div);
    });
    return;
  }
  var aliveA=G.allies.filter(function(u){return u&&u.hp>0;});
  var aliveE=G.enemies.filter(function(u){return u&&u.hp>0;});
  function chip(u,isEnemy){
    var div=document.createElement('div');
    div.className='to-unit'+(isEnemy?' enemy-turn':'');
    if((isEnemy&&enemyTurn)||(!isEnemy&&!enemyTurn)) div.classList.add('active-turn');
    div.textContent=((u.name||'?')+'').toUpperCase();
    host.appendChild(div);
  }
  aliveA.forEach(function(u){chip(u,false);});
  if(aliveA.length&&aliveE.length){
    var sep=document.createElement('div');
    sep.className='to-sep';
    host.appendChild(sep);
  }
  aliveE.forEach(function(u){chip(u,true);});
}

  const ec=ab.eCost!==undefined&&ab.eCost!==null?Number(ab.eCost):0;
  const noE=ec>u.energy;
  const selected=G.actions[u.id]===ab;
  const card=document.createElement('div');
  card.className='skc'+(ocd?' cdx':'')+(noE&&!ocd?' skdis':'')+(selected?' sl':'');
  card.style.setProperty('--skc',t.c);
  const costLbl=ab.cost!=null&&ab.cost!==''?ab.cost:(ab.eCost!==undefined&&ab.eCost!==null?ab.eCost+'⚡':'—');
  const right=ocd?`<span class="skcv on">${ab.cd} CD</span>`:(ab.maxCd>0?`<span class="skcv">CD:${ab.maxCd}</span>`:'<span class="skcv"></span>');
  card.innerHTML=`<div class="skt">${escHtml(t.l)}</div><div class="skn">${escHtml(ab.name)}</div><div class="skd">${escHtml(ab.desc)}</div><div class="skm"><span class="skcs">${escHtml(costLbl)}</span>${right}</div>`;
  if(!dead&&!ocd&&!noE)card.onclick=(e)=>{e.stopPropagation();selectAbility(u,ab)};
  return card;
}
